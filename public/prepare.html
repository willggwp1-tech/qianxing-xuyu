<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牽星絮語 — 準備</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
/* ============================================================
   牽星絮語 — 準備界面 (Prepare Scene) — Phaser 3
   Reads: localStorage.collectedEvidence (array of evidence IDs)
   Shows collected evidence cards. Player reviews then starts duel.
   ============================================================ */

const ALL_EVIDENCE = [
  { id: 'ev_math_notebook',   name: '數學筆記本',       type: 'cognitive_restructure',   desc: '寫滿公式的數學筆記本，體現子傑對學習的熱誠。' },
  { id: 'ev_drawer',          name: '整齊的抽屜',       type: 'cognitive_restructure',   desc: '精心安排的課本排列，體現對上課的熱情。' },
  { id: 'ev_study_plan',      name: '學習進度表',       type: 'behavioral_activation',   desc: '子傑用來規劃學習的進度表。' },
  { id: 'ev_classmate_words', name: '女同學的話',       type: 'behavioral_activation',   desc: '女同學觀察到子傑每次課間都在學習。' },
  { id: 'ev_dinosaur_model',  name: '媽媽送的暴龍模型', type: 'reduce_misunderstanding', desc: '媽媽送給子傑的禮物，小巧精緻的暴龍模型。' },
  { id: 'ev_account_book',    name: '媽媽的帳本',       type: 'socratic_questioning',    desc: '記錄媽媽辛苦存款、大支出掏空積蓄的帳本。' }
];

const TYPE_COLORS = {
  cognitive_restructure:   0x4488ff,
  behavioral_activation:   0x44cc88,
  reduce_misunderstanding: 0xff8844,
  socratic_questioning:    0xcc66bb
};

const TYPE_LABELS = {
  cognitive_restructure:   '認知重組',
  behavioral_activation:   '行為活化',
  reduce_misunderstanding: '減少誤解',
  socratic_questioning:    '蘇格拉底式提問'
};

class PrepareScene extends Phaser.Scene {
  constructor() {
    super('PrepareScene');
    this.collected = [];
  }

  preload() {
    this.load.image('bg', 'assets/background/background.png');
  }

  create() {
    const { width, height } = this.scale;

    try {
      this.collected = JSON.parse(localStorage.getItem('collectedEvidence') || '[]');
    } catch { this.collected = []; }

    // Background
    const bg = this.add.image(width / 2, height / 2, 'bg');
    bg.setScale(Math.max(width / bg.width, height / bg.height));

    // Title
    this.add.text(width / 2, 44, '第一章 — 收集到的證據', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '48px', color: '#a0c4ff', fontStyle: 'bold'
    }).setOrigin(0.5, 0).setDepth(1);

    const collectedCount = this.collected.length;
    this.add.text(width / 2, 110, `已收集 ${collectedCount} / ${ALL_EVIDENCE.length} 項證據`, {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '26px', color: '#556688'
    }).setOrigin(0.5, 0).setDepth(1);

    // Evidence cards — two rows of 3
    this.buildEvidenceCards();

    // Buttons
    this.createButton(width / 2 + 230, height - 58, '開始對決 →', () => {
      window.location.href = 'duel.html';
    });
    this.createButton(width / 2 - 230, height - 58, '← 返回章節', () => {
      window.location.href = 'chapter1.html';
    });
  }

  buildEvidenceCards() {
    const { width } = this.scale;
    const cardW = 280;
    const cardH = 320;
    const gap   = 36;
    const cols  = 3;
    const totalW = cols * cardW + (cols - 1) * gap;
    const startX = (width - totalW) / 2 + cardW / 2;
    const rowYs  = [360, 720];

    ALL_EVIDENCE.forEach((ev, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx  = startX + col * (cardW + gap);
      const cy  = rowYs[row];

      const isCollected = this.collected.includes(ev.id);
      const typeColor   = isCollected ? (TYPE_COLORS[ev.type] || 0x888888) : 0x333344;
      const fillColor   = isCollected ? 0x0f1428 : 0x080c18;

      const container = this.add.container(cx, cy).setDepth(5).setSize(cardW, cardH);

      const cardBg = this.add.rectangle(0, 0, cardW, cardH, fillColor, 0.95)
        .setStrokeStyle(2, typeColor, isCollected ? 1 : 0.4);
      container.add(cardBg);

      container.add(
        this.add.rectangle(0, -cardH / 2 + 10, cardW - 20, 8, typeColor, isCollected ? 1 : 0.3)
          .setOrigin(0.5, 0)
      );

      if (isCollected) {
        container.add(this.add.text(0, -cardH / 2 + 30, TYPE_LABELS[ev.type] || '', {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '20px', color: '#8899aa'
        }).setOrigin(0.5, 0));

        container.add(this.add.text(0, -30, ev.name, {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '32px', color: '#e8f0ff', fontStyle: 'bold'
        }).setOrigin(0.5));

        container.add(this.add.text(0, 40, ev.desc, {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '19px', color: '#7799aa',
          wordWrap: { width: cardW - 40 }, align: 'center'
        }).setOrigin(0.5, 0));

        container.setInteractive(
          new Phaser.Geom.Rectangle(-cardW / 2, -cardH / 2, cardW, cardH),
          Phaser.Geom.Rectangle.Contains
        );
        container.on('pointerover', () => {
          this.tweens.add({ targets: container, scale: 1.04, y: cy - 8, duration: 120, ease: 'Sine.easeOut' });
          cardBg.setStrokeStyle(3, typeColor, 1);
        });
        container.on('pointerout', () => {
          this.tweens.add({ targets: container, scale: 1, y: cy, duration: 120, ease: 'Sine.easeOut' });
          cardBg.setStrokeStyle(2, typeColor, 1);
        });
      } else {
        container.add(this.add.rectangle(0, 0, cardW, cardH, 0x000000, 0.5));
        container.add(this.add.text(0, -10, '🔒', { fontSize: '44px' }).setOrigin(0.5));
        container.add(this.add.text(0, 50, '尚未收集', {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '22px', color: '#334455'
        }).setOrigin(0.5));
      }

      container.setAlpha(0).setScale(0.88);
      this.tweens.add({ targets: container, alpha: 1, scale: 1, duration: 320, delay: i * 60, ease: 'Back.easeOut' });
    });
  }

  createButton(x, y, label, callback) {
    const btn = this.add.container(x, y).setDepth(5);
    const bg  = this.add.rectangle(0, 0, 320, 72, 0x1a3a5c, 0.9)
      .setStrokeStyle(1, 0x4488cc, 0.6)
      .setInteractive({ useHandCursor: true });
    const txt = this.add.text(0, 0, label, {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '28px', color: '#a0c4ff'
    }).setOrigin(0.5);
    btn.add([bg, txt]);
    bg.on('pointerover', () => { bg.setFillStyle(0x264d73, 1); this.tweens.add({ targets: btn, scale: 1.05, duration: 100 }); });
    bg.on('pointerout',  () => { bg.setFillStyle(0x1a3a5c, 0.9); this.tweens.add({ targets: btn, scale: 1, duration: 100 }); });
    bg.on('pointerdown', () => callback());
    return btn;
  }
}

const config = {
  type: Phaser.AUTO,
  width: 1920,
  height: 1080,
  parent: document.body,
  backgroundColor: '#000000',
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [PrepareScene]
};

new Phaser.Game(config);
</script>
</body>
</html>
