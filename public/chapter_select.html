<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牽星絮語 — 關卡選擇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: #0b0e1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .bg-image {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url('assets/background/chapter_select.jpg') center/cover no-repeat;
      z-index: 0;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #a0c4ff; position: relative; z-index: 1; }
    p { margin-bottom: 2rem; color: #8899aa; position: relative; z-index: 1; }
    .nav-btn {
      display: inline-block;
      padding: 12px 36px;
      background: #1a3a5c;
      color: #a0c4ff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .nav-btn:hover { background: #264d73; }
    .nav { display: flex; gap: 1rem; position: relative; z-index: 1; }
    .chapter-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }
    .chapter-btn {
      display: block;
      padding: 16px 64px;
      background: rgba(26, 58, 92, 0.85);
      color: #a0c4ff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.2rem;
      text-align: center;
      transition: background 0.2s, transform 0.15s;
      border: 1px solid rgba(160, 196, 255, 0.15);
    }
    .chapter-btn:hover { background: rgba(38, 77, 115, 0.9); transform: scale(1.03); }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <h1>關卡選擇</h1>
  <p>Chapter Select</p>
  <div class="chapter-list">
    <a class="chapter-btn" href="prologue.html">序章 — Prologue</a>
    <a class="chapter-btn" href="chapter1.html">第一章 — Chapter 1</a>
    <a class="chapter-btn" href="chapter2.html">第二章 — Chapter 2</a>
  </div>
  <div class="nav">
    <a class="nav-btn" href="start.html">← 返回首頁</a>
  </div>
</body>
</html>
