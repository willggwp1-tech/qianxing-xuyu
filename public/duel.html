<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牽星絮語 — 對決界面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
/* ============================================================
   牽星絮語 — 對決 (Duel Scene) — Phaser 3
   Reads:  localStorage.collectedEvidence  (array of collected evidence IDs)
   Writes: localStorage.battleResult (battle result object)
   ============================================================ */

// ---- 4 rounds of distorted thoughts ----
const ALL_EVIDENCE = [
  { id: 'ev_math_notebook',   name: '數學筆記本',       type: 'cognitive_restructure',   desc: '寫滿公式的數學筆記本，體現子傑對學習的熱誠。' },
  { id: 'ev_drawer',          name: '整齊的抽屜',       type: 'cognitive_restructure',   desc: '精心安排的課本排列，體現對上課的熱情。' },
  { id: 'ev_study_plan',      name: '學習進度表',       type: 'behavioral_activation',   desc: '子傑用來規劃學習的進度表。' },
  { id: 'ev_classmate_words', name: '女同學的話',       type: 'behavioral_activation',   desc: '女同學觀察到子傑每次課間都在學習。' },
  { id: 'ev_dinosaur_model',  name: '媽媽送的暴龍模型', type: 'reduce_misunderstanding', desc: '媽媽送給子傑的禮物，小巧精緻的暴龍模型。' },
  { id: 'ev_account_book',    name: '媽媽的帳本',       type: 'socratic_questioning',    desc: '記錄媽媽辛苦存款、大支出掏空積蓄的帳本。' }
];

const ROUNDS = [
  { thought: '「我是一個廢物，什麼都做不好」', technique: 'cognitive_restructure',   techniqueLabel: '認知重組' },
  { thought: '「我從來沒有努力過」',          technique: 'behavioral_activation',   techniqueLabel: '行為活化' },
  { thought: '「媽媽只會逼迫我，根本不在乎我」', technique: 'reduce_misunderstanding', techniqueLabel: '減少誤解' },
  { thought: '「未來沒有希望，我永遠不會變好」', technique: 'combined',                techniqueLabel: '綜合應對' }
];

// Corruption level changes per result type
const CORRUPTION_DELTA = {
  CORRECT: -25,
  MISS:      0
};

// Type color mapping
const TYPE_COLORS = {
  cognitive_restructure:   0x4488ff,
  behavioral_activation:   0x44cc88,
  reduce_misunderstanding: 0xff8844,
  socratic_questioning:    0xcc66bb
};

// ---- Duel Scene ----
class DuelScene extends Phaser.Scene {
  constructor() {
    super('DuelScene');
    this.battleCards   = [];   // collected evidence cards
    this.usedCardIds   = [];   // IDs of cards already played
    this.currentRound  = 0;    // 0-indexed
    this.corruption    = 100;  // Zihjie's negative-energy meter (starts full)
    this.battleResults = [];   // { round, cardId, resultType } per round
    this.roundState    = 'idle'; // idle | waiting_card | resolving | done
    this.busy          = false;
    this.cardObjects   = [];
    this.dropZone      = null;
    this.draggingCard  = null;
  }

  preload() {
    this.load.image('bg', 'assets/background/background.png');
    this.load.image('blueElf', 'assets/character/blue_elf.png');
    this.load.image('dialogBox', 'assets/UI/dialog_box.PNG');
    this.load.audio('bgm', 'assets/music/card_battle.mp3');
    this.load.image('musicBtn', 'assets/buttons/music.png');
    this.load.image('starFragment', 'assets/cards/star_fragment.png');
  }

  create() {
    const { width, height } = this.scale;

    // Load collected evidence as hand cards
    try {
      const ids = JSON.parse(localStorage.getItem('collectedEvidence') || '[]');
      this.battleCards = ids
        .map(id => ALL_EVIDENCE.find(e => e.id === id))
        .filter(Boolean);
    } catch { this.battleCards = []; }

    // Inject Resonance Shard card if player collected one in chapter
    try {
      const shardRaw = localStorage.getItem('collectedShard');
      if (shardRaw) {
        const shard = JSON.parse(shardRaw);
        // Prepend so it always appears first in hand
        this.battleCards.unshift({
          id: 'resonance_shard',
          name: '星魂碎片',
          type: 'resonance',
          isResonance: true,
          inscription: shard.inscription || '',
          creatorName: shard.creatorName || '旅行者'
        });
      }
    } catch {}

    // --- Background ---
    const bgImg = this.add.image(width / 2, height / 2, 'bg');
    const bgScale = Math.max(width / bgImg.width, height / bgImg.height);
    bgImg.setScale(bgScale);

    // --- Title ---
    this.add.rectangle(width / 2, 40, width, 80, 0x0a0e1a, 0.8).setDepth(1);
    this.add.text(width / 2, 40, '第一章 — 認知對決', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '34px', color: '#a0c4ff', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(2);

    // Back to prepare button
    const backBtn = this.add.text(width - 40, 40, '準備 ←', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '26px', color: '#556677'
    }).setOrigin(1, 0.5).setDepth(2).setInteractive({ useHandCursor: true });
    backBtn.on('pointerdown', () => { window.location.href = 'prepare.html'; });
    backBtn.on('pointerover', () => backBtn.setColor('#a0c4ff'));
    backBtn.on('pointerout',  () => backBtn.setColor('#556677'));

    // --- Zihjie character (left side) ---
    this.elfSprite = this.add.image(300, 380, 'blueElf').setDepth(3);
    const elfH = 300;
    this.elfSprite.setScale(elfH / this.elfSprite.height);

    this.add.text(300, 556, '莊子傑', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '26px', color: '#aabbcc'
    }).setOrigin(0.5).setDepth(3);

    // --- Corruption bar ---
    this.add.text(120, 590, '負面侵蝕', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '22px', color: '#cc88aa'
    }).setDepth(3);
    this.corruptionBarBg = this.add.rectangle(300, 626, 360, 26, 0x1a1a2e, 1)
      .setStrokeStyle(1, 0xaa4466, 0.5).setDepth(3);
    this.corruptionBarFill = this.add.rectangle(120, 626, 360, 22, 0xcc4466, 1)
      .setOrigin(0, 0.5).setDepth(4);
    this.corruptionText = this.add.text(492, 626, '100%', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '20px', color: '#dd88aa'
    }).setOrigin(0, 0.5).setDepth(4);

    // --- Round indicator ---
    this.roundText = this.add.text(width / 2, 90, '第 1 / 4 回合', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '26px', color: '#778899'
    }).setOrigin(0.5).setDepth(2);

    // --- Distorted thought bubble (center) ---
    this.thoughtBubbleBg = this.add.rectangle(width / 2, 340, 800, 200, 0x10152a, 0.92)
      .setStrokeStyle(2, 0xcc4466, 0.5).setDepth(5);
    this.thoughtLabel = this.add.text(width / 2, 254, '【扭曲思維】', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '22px', color: '#cc6688', fontStyle: 'italic'
    }).setOrigin(0.5).setDepth(6);
    this.thoughtText = this.add.text(width / 2, 310, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '30px', color: '#e8d0d8',
      wordWrap: { width: 740 }, align: 'center'
    }).setOrigin(0.5, 0).setDepth(6);

    // --- Instruction text ---
    this.instructionText = this.add.text(width / 2, 480, '將一張證據卡牌拖曳到中央區域來反駁這個想法', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '24px', color: '#556677'
    }).setOrigin(0.5).setDepth(5);

    // --- Drop zone (center) ---
    const dropX = width / 2;
    const dropY = 570;
    const dropW = 360;
    const dropH = 120;
    this.dropZoneBg = this.add.rectangle(dropX, dropY, dropW, dropH, 0x0c1826, 0.85)
      .setStrokeStyle(2, 0x446688, 0.5).setDepth(4);
    this.dropZoneHint = this.add.text(dropX, dropY, '拖放至此', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '24px', color: '#334455'
    }).setOrigin(0.5).setDepth(5);
    this.dropZone = this.add.zone(dropX, dropY, dropW, dropH).setDepth(10);

    // --- Skip button (play no card) ---
    this.skipBtn = this.createSmallButton(width - 200, dropY, '跳過此回合', () => this.playCard(null));

    // --- Feedback text ---
    this.feedbackText = this.add.text(width / 2, 680, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '36px', color: '#ffcc44', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(20).setAlpha(0);

    // --- Result overlay (hidden until end) ---
    this.resultOverlay = this.add.rectangle(width / 2, height / 2, width, height, 0x000000, 0)
      .setDepth(40).setAlpha(0);
    this.resultTitle = this.add.text(width / 2, height / 2 - 80, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '54px', color: '#ffffff', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(42).setAlpha(0);
    this.resultSub = this.add.text(width / 2, height / 2 + 10, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '28px', color: '#8899aa', align: 'center',
      wordWrap: { width: 800 }
    }).setOrigin(0.5).setDepth(42).setAlpha(0);
    this.resultScore = this.add.text(width / 2, height / 2 + 70, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '28px', color: '#a0c4ff'
    }).setOrigin(0.5).setDepth(42).setAlpha(0);

    // --- Hand cards ---
    this.buildHandCards();

    // --- BGM ---
    this.musicOn = true;
    this.bgmLoopTimer = null;
    this.bgm = this.sound.add('bgm', { loop: false, volume: 0 });
    const playBgm = () => {
      if (!this.musicOn) return;
      this.bgm.volume = 0;
      this.bgm.play();
      this.tweens.add({ targets: this.bgm, volume: 0.35, duration: 1500, ease: 'Linear' });
      const fadeMs = 1400;
      this.bgmLoopTimer = this.time.delayedCall(
        Math.max(0, this.bgm.duration * 1000 - fadeMs), () => {
          this.tweens.killTweensOf(this.bgm);
          this.tweens.add({ targets: this.bgm, volume: 0, duration: fadeMs, ease: 'Linear' });
        });
    };
    this.bgm.on('complete', () => { this.bgmLoopTimer = null; playBgm(); });
    playBgm();

    // Music toggle
    this.musicBtn = this.add.image(10, 8, 'musicBtn')
      .setDisplaySize(70, 70).setOrigin(0, 0).setDepth(11)
      .setInteractive({ useHandCursor: true });
    this.musicBtn.on('pointerdown', () => this.toggleMusic());
    this.musicBtn.on('pointerover', () => this.musicBtn.setTint(0xaad4ff));
    this.musicBtn.on('pointerout', () => this.musicBtn.clearTint());

    // --- Drag events ---
    this.input.on('drag', (pointer, go, dragX, dragY) => {
      go.x = dragX;
      go.y = dragY;
      // Highlight drop zone when hovering
      const { width: w } = this.scale;
      const dropX2 = w / 2;
      const near = Math.abs(go.x - dropX2) < 220 && Math.abs(go.y - 570) < 100;
      this.dropZoneBg.setStrokeStyle(2, near ? 0x88ccff : 0x446688, near ? 1 : 0.5);
    });

    this.input.on('dragend', (pointer, go) => {
      const { width: w } = this.scale;
      // Check if dropped on drop zone
      if (Math.abs(go.x - w / 2) < 200 && Math.abs(go.y - 570) < 90) {
        this.playCard(go.cardData);
      } else {
        // Return to hand
        this.tweens.add({ targets: go, x: go.homeX, y: go.homeY, scale: 1, duration: 200, ease: 'Back.easeOut' });
        go.setDepth(10);
      }
      this.dropZoneBg.setStrokeStyle(2, 0x446688, 0.5);
    });

    // --- Start first round ---
    this.time.delayedCall(400, () => this.startRound());
  }

  // ---- Build hand cards at bottom ----
  buildHandCards() {
    this.cardObjects.forEach(c => c.destroy());
    this.cardObjects = [];

    const { width, height } = this.scale;
    // Only show cards not yet used
    const available = this.battleCards.filter(c => !this.usedCardIds.includes(c.id));
    const cardW = 220;
    const cardH = 130;
    const gap = 20;
    const total = available.length;
    if (total === 0) return;

    const totalW = total * cardW + (total - 1) * gap;
    const startX = (width - totalW) / 2 + cardW / 2;
    const cardY = height - 90;

    available.forEach((card, i) => {
      const cx = startX + i * (cardW + gap);
      const container = this.add.container(cx, cardY).setDepth(10).setSize(cardW, cardH);
      container.cardData = card;
      container.homeX = cx;
      container.homeY = cardY;

      const isResonance = card.isResonance === true;
      const typeColor = isResonance ? 0xffcc00 : (TYPE_COLORS[card.type] || 0x888888);
      const bgFill   = isResonance ? 0x1a1000 : 0x0f1428;
      const bg = this.add.rectangle(0, 0, cardW, cardH, bgFill, 0.95)
        .setStrokeStyle(isResonance ? 3 : 2, typeColor, 1)
        .setInteractive({ useHandCursor: true, draggable: true });
      container.add(bg);

      // Top strip
      container.add(this.add.rectangle(0, -cardH / 2 + 7, cardW - 16, 7, typeColor, 1).setOrigin(0.5, 0));

      if (isResonance) {
        // Crystal image centred in the card
        const crystalImg = this.add.image(-62, 0, 'starFragment').setDisplaySize(80, 80);
        container.add(crystalImg);
        // Name
        container.add(this.add.text(12, -22, card.name, {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '22px', color: '#ffee88', fontStyle: 'bold'
        }).setOrigin(0, 0.5));
        // Inscription preview (first 12 chars)
        const preview = card.inscription ? card.inscription.substring(0, 12) : '';
        container.add(this.add.text(12, 6, preview, {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '16px', color: '#ccbbee'
        }).setOrigin(0, 0.5));
        // Permanent badge
        container.add(this.add.text(12, 36, '永久 · 萬用', {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '15px', color: '#aa8844'
        }).setOrigin(0, 0.5));
        // Crystal + card pulse
        this.tweens.add({
          targets: [bg, crystalImg], alpha: { from: 0.85, to: 1 },
          duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
      } else {
        // Normal card name
        const nameTxt = this.add.text(0, -8, card.name, {
          fontFamily: '"Microsoft JhengHei", sans-serif',
          fontSize: '24px', color: '#e0e0e0', fontStyle: 'bold'
        }).setOrigin(0.5);
        container.add(nameTxt);
      }

      // Drag — container must have setInteractive before setDraggable
      container.setInteractive(
        new Phaser.Geom.Rectangle(-cardW / 2, -cardH / 2, cardW, cardH),
        Phaser.Geom.Rectangle.Contains
      );
      this.input.setDraggable(container);

      bg.on('pointerover', () => {
        if (this.roundState !== 'waiting_card' || this.busy) return;
        this.tweens.add({ targets: container, scale: 1.08, y: cardY - 12, duration: 120 });
        bg.setFillStyle(0x1a2a40, 1);
      });
      bg.on('pointerout', () => {
        if (container.x === cx) { // only reset if not being dragged
          this.tweens.add({ targets: container, scale: 1, y: cardY, duration: 120 });
          bg.setFillStyle(0x0f1428, 0.95);
        }
      });

      // Entrance
      container.setAlpha(0).setScale(0.85);
      this.tweens.add({ targets: container, alpha: 1, scale: 1, duration: 280, delay: i * 60, ease: 'Back.easeOut' });

      this.cardObjects.push(container);
    });
  }

  // ---- Start a round ----
  startRound() {
    if (this.currentRound >= ROUNDS.length) {
      this.endBattle();
      return;
    }
    this.roundState = 'waiting_card';
    this.busy = false;
    const round = ROUNDS[this.currentRound];

    this.roundText.setText(`第 ${this.currentRound + 1} / ${ROUNDS.length} 回合`);
    this.thoughtText.setText(round.thought);
    this.thoughtLabel.setText(`【${round.techniqueLabel}】`);
    this.instructionText.setVisible(true);
    this.skipBtn.setVisible(true);
    this.dropZoneHint.setVisible(true);

    // Pulse drop zone
    this.tweens.add({
      targets: this.dropZoneBg,
      alpha: { from: 0.6, to: 1 }, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
    });

    // Rebuild hand cards (in case prev round used one)
    this.buildHandCards();

    // Shake elf
    this.tweens.add({
      targets: this.elfSprite,
      x: this.elfSprite.x - 6, duration: 60, yoyo: true, repeat: 3, ease: 'Sine.easeInOut'
    });
  }

  // ---- Player plays a card (or null = skip) ----
  playCard(cardData) {
    if (this.roundState !== 'waiting_card' || this.busy) return;
    this.roundState = 'resolving';
    this.busy = true;

    this.tweens.killTweensOf(this.dropZoneBg);
    this.dropZoneBg.setAlpha(1);
    this.instructionText.setVisible(false);
    this.skipBtn.setVisible(false);
    this.dropZoneHint.setVisible(false);

    const round = ROUNDS[this.currentRound];
    let resultType = 'MISS';
    let cardId = null;

    if (cardData) {
      cardId = cardData.id;

      if (cardData.isResonance) {
        // Resonance Shard — always correct, permanent (never consumed)
        resultType = 'CORRECT';
        // cardId is NOT pushed to usedCardIds so the card stays in hand
      } else {
        this.usedCardIds.push(cardId);
        resultType = 'CORRECT'; // any evidence card is valid
      }
    }

    // Record result
    this.battleResults.push({ round: this.currentRound, cardId, resultType });

    // Update corruption
    let delta = CORRUPTION_DELTA[resultType] || 0;
    if (cardData && cardData.isResonance && resultType === 'CORRECT') delta = -35; // bonus
    this.corruption = Math.max(0, Math.min(100, this.corruption + delta));
    this.updateCorruptionBar();

    // Show feedback — special banner for Resonance Card
    let feedbackStr, feedbackColor;
    if (cardData && cardData.isResonance) {
      const insc = cardData.inscription || '希望 堅持 會好的';
      feedbackStr = `✦ 來自旅行者的祝福 ✦\n${insc}`;
      feedbackColor = '#ffee88';
    } else {
      const feedbackMap = {
        CORRECT: { text: '很好！成功反駁了這個想法！',  color: '#44ff88' },
        MISS:    { text: '沒有出牌，侵蝕未變化…',       color: '#ff8866' }
      };
      feedbackStr = feedbackMap[resultType].text;
      feedbackColor = feedbackMap[resultType].color;
    }
    this.feedbackText.setText(feedbackStr).setColor(feedbackColor).setAlpha(1).setY(680);
    this.tweens.add({
      targets: this.feedbackText,
      alpha: 0, y: 640, duration: 1400, delay: 600, ease: 'Sine.easeIn',
      onComplete: () => { this.feedbackText.y = 680; }
    });

    // Flash drop zone
    this.tweens.add({
      targets: this.dropZoneBg,
      fillColor: resultType === 'CORRECT' ? 0x0c2a18 : resultType === 'PARTIAL' ? 0x1a1a08 : 0x1a0808,
      duration: 300, yoyo: true
    });

    // Grey out played card in hand display
    if (cardData) {
      const cardObj = this.cardObjects.find(c => c.cardData && c.cardData.id === cardId);
      if (cardObj) {
        this.tweens.add({ targets: cardObj, alpha: 0, scale: 0.6, duration: 400, ease: 'Sine.easeIn',
          onComplete: () => cardObj.destroy() });
      }
    }

    // Advance to next round after delay
    this.time.delayedCall(2000, () => {
      this.currentRound++;
      this.busy = false;
      this.startRound();
    });
  }

  // ---- Update corruption bar ----
  updateCorruptionBar() {
    const pct = this.corruption / 100;
    const barMaxW = 360;
    this.tweens.add({
      targets: this.corruptionBarFill,
      displayWidth: Math.max(0, barMaxW * pct),
      duration: 500, ease: 'Sine.easeOut'
    });
    this.corruptionText.setText(`${Math.round(this.corruption)}%`);
  }

  // ---- End battle after 4 rounds ----
  endBattle() {
    this.roundState = 'done';
    this.busy = true;
    this.skipBtn.setVisible(false);

    const correctCount = this.battleResults.filter(r => r.resultType === 'CORRECT').length;
    const totalRounds  = ROUNDS.length;

    let outcome, outcomeColor, outcomeDesc;
    if (correctCount === 4) {
      outcome     = '完美！';
      outcomeColor = '#66ffaa';
      outcomeDesc  = '你精準地反駁了子傑所有扭曲的思維，他開始重新看待自己。';
    } else if (correctCount >= 2) {
      outcome     = '成功';
      outcomeColor = '#88ccff';
      outcomeDesc  = '你成功幫助子傑釐清了大部分的負面想法。';
    } else if (correctCount >= 1) {
      outcome     = '部分成功';
      outcomeColor = '#ffcc44';
      outcomeDesc  = '你幫助了子傑，但還有一些扭曲思維未被完全消除。';
    } else {
      outcome     = '失敗';
      outcomeColor = '#ff6666';
      outcomeDesc  = '子傑的負面想法仍然根深柢固，需要重新嘗試。';
    }

    // Save result
    localStorage.setItem('battleResult', JSON.stringify({
      correctCount, totalRounds, results: this.battleResults, outcome
    }));

    const { width, height } = this.scale;

    // Dim overlay
    this.tweens.add({ targets: this.resultOverlay, alpha: 0.7, duration: 800 });

    this.resultTitle.setText(outcome).setColor(outcomeColor);
    this.resultSub.setText(outcomeDesc);
    this.resultScore.setText(`正確反駁: ${correctCount} / ${totalRounds}  ·  最終侵蝕值: ${Math.round(this.corruption)}%`);

    this.tweens.add({
      targets: [this.resultTitle, this.resultSub, this.resultScore],
      alpha: 1, duration: 600, delay: 500, ease: 'Sine.easeOut'
    });

    // Continue button
    this.time.delayedCall(1400, () => {
      const isWin = correctCount >= 1;
      // After a win, go to shard creation page; set return target so it knows where to go after
      if (isWin) localStorage.setItem('afterShardCreate', 'chatbot.html');
      const nextUrl = isWin ? 'shard_create.html' : 'prepare.html';
      const nextLabel = isWin ? '繼續 →' : '重新準備';

      const btn = this.add.container(width / 2, height / 2 + 130).setDepth(50).setAlpha(0);
      const btnBg = this.add.rectangle(0, 0, 340, 76, 0x1a3a5c, 0.95)
        .setStrokeStyle(1, 0x4488cc, 0.7)
        .setInteractive({ useHandCursor: true });
      const btnTxt = this.add.text(0, 0, nextLabel, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '30px', color: '#a0c4ff'
      }).setOrigin(0.5);
      btn.add([btnBg, btnTxt]);
      this.tweens.add({ targets: btn, alpha: 1, duration: 400 });

      btnBg.on('pointerover', () => { btnBg.setFillStyle(0x264d73, 1); this.tweens.add({ targets: btn, scale: 1.05, duration: 100 }); });
      btnBg.on('pointerout',  () => { btnBg.setFillStyle(0x1a3a5c, 0.95); this.tweens.add({ targets: btn, scale: 1, duration: 100 }); });
      btnBg.on('pointerdown', () => { window.location.href = nextUrl; });
    });
  }

  // ---- Small utility button ----
  createSmallButton(x, y, label, callback) {
    const btn = this.add.container(x, y).setDepth(6);
    const bg = this.add.rectangle(0, 0, 240, 56, 0x1a2a3c, 0.88)
      .setStrokeStyle(1, 0x446688, 0.6)
      .setInteractive({ useHandCursor: true });
    const txt = this.add.text(0, 0, label, {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '22px', color: '#7799aa'
    }).setOrigin(0.5);
    btn.add([bg, txt]);
    bg.on('pointerover', () => { bg.setFillStyle(0x263a50, 1); });
    bg.on('pointerout',  () => { bg.setFillStyle(0x1a2a3c, 0.88); });
    bg.on('pointerdown', () => callback());
    return btn;
  }

  toggleMusic() {
    this.musicOn = !this.musicOn;
    this.musicBtn.setAlpha(this.musicOn ? 1 : 0.4);
    if (this.musicOn) {
      if (!this.bgm.isPlaying) {
        this.bgm.volume = 0;
        this.bgm.play();
        this.tweens.add({ targets: this.bgm, volume: 0.35, duration: 1500 });
        const fadeMs = 1400;
        this.bgmLoopTimer = this.time.delayedCall(
          Math.max(0, this.bgm.duration * 1000 - fadeMs), () => {
            this.tweens.killTweensOf(this.bgm);
            this.tweens.add({ targets: this.bgm, volume: 0, duration: fadeMs });
          });
      }
    } else {
      if (this.bgmLoopTimer) { this.bgmLoopTimer.destroy(); this.bgmLoopTimer = null; }
      this.tweens.killTweensOf(this.bgm);
      this.tweens.add({
        targets: this.bgm, volume: 0, duration: 800,
        onComplete: () => { if (!this.musicOn) this.bgm.stop(); }
      });
    }
  }
}

// ---- Phaser config ----
const config = {
  type: Phaser.AUTO,
  width: 1920,
  height: 1080,
  parent: document.body,
  backgroundColor: '#000000',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [DuelScene]
};

const game = new Phaser.Game(config);
</script>
