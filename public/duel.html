<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牽星絮語 — 對決界面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="tutorial.js"></script>
<script>
/* ============================================================
   牽星絮語 — 對決 (Duel Scene) — Phaser 3
   Reads:  localStorage.collectedEvidence  (array of collected evidence IDs)
   Writes: localStorage.battleResult (battle result object)

   HP system:
     Enemy starts at 4 HP  — correct answer → enemy -1 HP
     Player starts at 3 HP — wrong answer   → player -1 HP
   Win:  enemy HP reaches 0
   Lose: player HP reaches 0
   ============================================================ */

// ---- Evidence card definitions ----
const ALL_EVIDENCE = [
  { id: 'ev_math_notebook',   name: '數學筆記本',       type: 'cognitive_restructure',   desc: '寫滿公式的數學筆記本，體現子傑對學習的熱誠。' },
  { id: 'ev_drawer',          name: '整齊的抽屜',       type: 'cognitive_restructure',   desc: '精心安排的課本排列，體現對上課的熱情。' },
  { id: 'ev_study_plan',      name: '學習進度表',       type: 'behavioral_activation',   desc: '子傑用來規劃學習的進度表。' },
  { id: 'ev_classmate_words', name: '女同學的話',       type: 'behavioral_activation',   desc: '女同學觀察到子傑每次課間都在學習。' },
  { id: 'ev_dinosaur_model',  name: '媽媽送的暴龍模型', type: 'reduce_misunderstanding', desc: '媽媽送給子傑的禮物，小巧精緻的暴龍模型。' },
  { id: 'ev_account_book',    name: '媽媽的帳本',       type: 'socratic_questioning',    desc: '記錄媽媽辛苦存款、大支出掏空積蓄的帳本。' }
];

// ---- Round definitions ----
// correctIds: all IDs that must be selected to count as correct.
//   - Single-card round  → array of length 1; player submits when any 1 card is dragged in.
//   - Multi-card round   → array of length N; player must drag in exactly those N cards before confirming.
// techniqueLabel: shown in the thought-bubble header.
const ROUNDS = [
  {
    thought:        '「我沒有努力學習，成績一直都是墊底的。」',
    techniqueLabel: '認知重組',
    correctIds:     ['ev_math_notebook'],   // single correct card
    requiredCount:  1
  },
  {
    thought:        '「學習根本沒有任何意義，我沒有獲得滿足感。我也沒有興趣學習。」',
    techniqueLabel: '行為活化',
    correctIds:     ['ev_drawer', 'ev_study_plan'], // both must be selected
    requiredCount:  2
  },
  {
    thought:        '「無論我是否努力學習，我也記不牢固知識，考試也考不好。我就是沒有天賦，大家都會瞧不起我的。」',
    techniqueLabel: '減少誤解',
    correctIds:     ['ev_classmate_words'], // single correct card
    requiredCount:  1
  },
  {
    thought:        '「媽媽根本就不在意我，只是把我當作一個學習機器！」',
    techniqueLabel: '減少誤解',
    correctIds:     ['ev_dinosaur_model', 'ev_account_book'], // both must be selected
    requiredCount:  2
  }
];

// ---- Starting HP ----
const ENEMY_START_HP  = 4;
const PLAYER_START_HP = 3;

// ---- Card image key mapping ----
const TYPE_COLORS = {
  cognitive_restructure:   0x4488ff,
  behavioral_activation:   0x44cc88,
  reduce_misunderstanding: 0xff8844,
  socratic_questioning:    0xcc66bb
};

// ---- Helper: check if a submitted set of IDs is exactly correct for a round ----
// Returns 'CORRECT' when submitted IDs match correctIds exactly (order-insensitive).
// Returns 'WRONG'   otherwise.
function evaluateSubmission(round, submittedIds) {
  const required = [...round.correctIds].sort();
  const given    = [...submittedIds].sort();
  if (required.length !== given.length) return 'WRONG';
  return required.every((id, i) => id === given[i]) ? 'CORRECT' : 'WRONG';
}

// ---- Duel Scene ----
class DuelScene extends Phaser.Scene {
  constructor() {
    super('DuelScene');
    this.battleCards    = [];   // collected evidence cards available as hand
    this.usedCardIds    = [];   // cards consumed (removed from hand after use)
    this.currentRound   = 0;
    this.enemyHP        = ENEMY_START_HP;
    this.playerHP       = PLAYER_START_HP;
    this.battleResults  = [];   // { round, submittedIds, result }
    this.roundState     = 'idle';  // idle | selecting | resolving | done
    this.busy           = false;
    this.cardObjects    = [];
    // Multi-select state
    this.selectedCardIds = [];   // IDs staged in the drop zone this round
    this.stagedCards     = [];   // card container objects sitting in drop zone
  }

  preload() {
    this.load.image('bg',         'assets/background/background.png');
    this.load.image('blueElf',    'assets/character/blue_elf.png');
    this.load.image('dialogBox',  'assets/UI/dialog_box.PNG');
    this.load.audio('bgm',        'assets/music/card_battle.mp3');
    this.load.image('musicBtn',   'assets/buttons/music.png');
    this.load.image('starFragment','assets/cards/star_fragment.png');
    // Evidence card images (Card1–6 mapped to evidence IDs via preload)
    this.load.image('card_ev_classmate_words',  'assets/cards/Card1.png');
    this.load.image('card_ev_dinosaur_model',   'assets/cards/Card2.png');
    this.load.image('card_ev_account_book',     'assets/cards/Card3.png');
    this.load.image('card_ev_study_plan',       'assets/cards/Card4.png');
    this.load.image('card_ev_drawer',           'assets/cards/Card5.png');
    this.load.image('card_ev_math_notebook',    'assets/cards/Card6.png');
  }

  create() {
    const { width, height } = this.scale;

    // ---- Load hand from localStorage ----
    try {
      const ids = JSON.parse(localStorage.getItem('collectedEvidence') || '[]');
      this.battleCards = ids.map(id => ALL_EVIDENCE.find(e => e.id === id)).filter(Boolean);
    } catch { this.battleCards = []; }

    // Inject Resonance Shard if collected
    try {
      const shardRaw = localStorage.getItem('collectedShard');
      if (shardRaw) {
        const shard = JSON.parse(shardRaw);
        this.battleCards.unshift({
          id: 'resonance_shard', name: '星魂碎片', type: 'resonance',
          isResonance: true,
          inscription: shard.inscription || '',
          creatorName: shard.creatorName || '旅行者'
        });
      }
    } catch {}

    // ---- Background ----
    const bgImg = this.add.image(width / 2, height / 2, 'bg');
    bgImg.setScale(Math.max(width / bgImg.width, height / bgImg.height));

    // ---- Title bar ----
    this.add.rectangle(width / 2, 40, width, 80, 0x0a0e1a, 0.8).setDepth(1);
    this.add.text(width / 2, 40, '第一章 — 認知對決', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '34px', color: '#a0c4ff', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(2);

    // Back button
    const backBtn = this.add.text(width - 40, 40, '準備 ←', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '26px', color: '#556677'
    }).setOrigin(1, 0.5).setDepth(2).setInteractive({ useHandCursor: true });
    backBtn.on('pointerdown', () => { window.location.href = 'prepare.html'; });
    backBtn.on('pointerover', () => backBtn.setColor('#a0c4ff'));
    backBtn.on('pointerout',  () => backBtn.setColor('#556677'));

    // ---- Zihjie sprite (left) ----
    this.elfSprite = this.add.image(260, 360, 'blueElf').setDepth(3);
    this.elfSprite.setScale(300 / this.elfSprite.height);
    this.add.text(260, 520, '莊子傑', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '26px', color: '#aabbcc'
    }).setOrigin(0.5).setDepth(3);

    // ---- Enemy HP bar ----
    this.add.text(100, 560, '敵方生命', {
      fontFamily: '"Microsoft JhengHei", sans-serif', fontSize: '22px', color: '#cc6688'
    }).setDepth(3);
    this._buildHPDots('enemy', 520, 596, ENEMY_START_HP, 0xcc4466);

    // ---- Player HP bar ----
    this.add.text(100, 636, '玩家生命', {
      fontFamily: '"Microsoft JhengHei", sans-serif', fontSize: '22px', color: '#66aacc'
    }).setDepth(3);
    this._buildHPDots('player', 520, 672, PLAYER_START_HP, 0x4488cc);

    // ---- Round indicator ----
    this.roundText = this.add.text(width / 2, 90, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '26px', color: '#778899'
    }).setOrigin(0.5).setDepth(2);

    // ---- Thought bubble (center-right) ----
    this.thoughtBubbleBg = this.add.rectangle(width / 2 + 160, 320, 820, 180, 0x10152a, 0.92)
      .setStrokeStyle(2, 0xcc4466, 0.5).setDepth(5);
    this.thoughtLabel = this.add.text(width / 2 + 160, 240, '【扭曲思維】', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '22px', color: '#cc6688', fontStyle: 'italic'
    }).setOrigin(0.5).setDepth(6);
    this.thoughtText = this.add.text(width / 2 + 160, 285, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '28px', color: '#e8d0d8',
      wordWrap: { width: 760 }, align: 'center'
    }).setOrigin(0.5, 0).setDepth(6);

    // ---- Instruction line ----
    this.instructionText = this.add.text(width / 2, 455, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '24px', color: '#778899'
    }).setOrigin(0.5).setDepth(5);

    // ---- Drop zone (staging area) ----
    const dropX = width / 2;
    const dropY = 560;
    const dropW = 500;
    const dropH = 140;
    this.dropZoneBg = this.add.rectangle(dropX, dropY, dropW, dropH, 0x0c1826, 0.85)
      .setStrokeStyle(2, 0x446688, 0.5).setDepth(4);
    this.dropZoneHint = this.add.text(dropX, dropY, '拖放證據卡至此', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '24px', color: '#334455'
    }).setOrigin(0.5).setDepth(5);
    // Invisible interaction zone for drop detection
    this.dropZoneArea = this.add.zone(dropX, dropY, dropW, dropH).setDepth(10);

    // ---- Confirm button (submit staged cards) ----
    this.confirmBtn = this._makeButton(dropX + 310, dropY, '確認出牌', () => this._submitStagedCards());
    this._hideBtn(this.confirmBtn);

    // ---- Feedback text ----
    this.feedbackText = this.add.text(width / 2, 720, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '36px', color: '#ffcc44', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(20).setAlpha(0);

    // ---- Result overlay ----
    this.resultOverlay = this.add.rectangle(width / 2, height / 2, width, height, 0x000000, 0).setDepth(40).setAlpha(0);

    // ---- Hand cards ----
    this.buildHandCards();

    // ---- BGM ----
    this.musicOn = true;
    this.bgmLoopTimer = null;
    this.bgm = this.sound.add('bgm', { loop: false, volume: 0 });
    const playBgm = () => {
      if (!this.musicOn) return;
      this.bgm.volume = 0; this.bgm.play();
      this.tweens.add({ targets: this.bgm, volume: 0.35, duration: 1500 });
      const fadeMs = 1400;
      this.bgmLoopTimer = this.time.delayedCall(
        Math.max(0, this.bgm.duration * 1000 - fadeMs), () => {
          this.tweens.killTweensOf(this.bgm);
          this.tweens.add({ targets: this.bgm, volume: 0, duration: fadeMs });
        });
    };
    this.bgm.on('complete', () => { this.bgmLoopTimer = null; playBgm(); });
    playBgm();

    this.musicBtn = this.add.image(10, 8, 'musicBtn')
      .setDisplaySize(70, 70).setOrigin(0, 0).setDepth(11).setInteractive({ useHandCursor: true });
    this.musicBtn.on('pointerdown', () => this.toggleMusic());
    this.musicBtn.on('pointerover', () => this.musicBtn.setTint(0xaad4ff));
    this.musicBtn.on('pointerout',  () => this.musicBtn.clearTint());

    // ---- Drag events ----
    this.input.on('dragstart', (pointer, go) => {
      go._dragging = true;
      go.setDepth(20);
      this.tweens.add({ targets: go, scale: 1.1, duration: 100 });
    });

    this.input.on('drag', (pointer, go, dragX, dragY) => {
      go.x = dragX; go.y = dragY;
      const near = this._isOverDropZone(go.x, go.y);
      this.dropZoneBg.setStrokeStyle(2, near ? 0x88ccff : 0x446688, near ? 1 : 0.5);
    });

    this.input.on('dragend', (pointer, go) => {
      go._dragging = false;
      go.setDepth(10);
      this.dropZoneBg.setStrokeStyle(2, 0x446688, 0.5);
      if (this._isOverDropZone(go.x, go.y)) {
        this._stageCard(go);
      } else {
        // Return to hand position
        this.tweens.add({ targets: go, x: go.homeX, y: go.homeY, scale: 1, duration: 200, ease: 'Back.easeOut' });
      }
    });

    // Start first round
    this.time.delayedCall(400, () => this.startRound());
  }

  // ---- Helper: is a point inside the drop zone? ----
  _isOverDropZone(x, y) {
    const dropX = this.scale.width / 2;
    const dropY = 560;
    return Math.abs(x - dropX) < 270 && Math.abs(y - dropY) < 90;
  }

  // ---- Helper: build HP dot indicators ----
  _buildHPDots(who, startX, y, total, color) {
    const dots = [];
    for (let i = 0; i < total; i++) {
      const dot = this.add.circle(startX + i * 36, y, 13, color, 1).setDepth(4);
      dots.push(dot);
    }
    this[who + 'HPDots'] = dots;
  }

  // ---- Helper: update HP dot visuals ----
  _updateHPDots(who, currentHP) {
    const dots = this[who + 'HPDots'];
    dots.forEach((dot, i) => {
      dot.setFillStyle(i < currentHP ? (who === 'enemy' ? 0xcc4466 : 0x4488cc) : 0x222233, i < currentHP ? 1 : 0.3);
    });
  }

  // ---- Stage a card into the drop zone ----
  _stageCard(cardObj) {
    if (this.roundState !== 'selecting' || this.busy) return;
    const round = ROUNDS[this.currentRound];
    const cardId = cardObj.cardData.id;

    // Don't stage the same card twice
    if (this.selectedCardIds.includes(cardId)) {
      this.tweens.add({ targets: cardObj, x: cardObj.homeX, y: cardObj.homeY, scale: 1, duration: 200 });
      return;
    }

    // Enforce max slots: can't stage more than required
    if (this.selectedCardIds.length >= round.requiredCount) {
      this.tweens.add({ targets: cardObj, x: cardObj.homeX, y: cardObj.homeY, scale: 1, duration: 200 });
      this._showFeedback(`此回合只需選 ${round.requiredCount} 張牌`, '#ffaa44', 1200);
      return;
    }

    this.selectedCardIds.push(cardId);
    this.stagedCards.push(cardObj);
    cardObj._staged = true;

    // Position staged cards neatly inside the drop zone
    const dropX = this.scale.width / 2;
    const dropY = 560;
    const slotW = 120;
    const count = this.stagedCards.length;
    this.stagedCards.forEach((c, i) => {
      const tx = dropX - ((count - 1) * slotW / 2) + i * slotW;
      this.tweens.killTweensOf(c);
      this.tweens.add({ targets: c, x: tx, y: dropY, scale: 0.65, duration: 180, ease: 'Back.easeOut' });
    });

    // Hide the hint text once a card is staged
    this.dropZoneHint.setVisible(false);

    // Update confirm button label — shard is a wildcard so always show 確認出牌 if shard is staged
    const needMore = round.requiredCount - this.selectedCardIds.length;
    const shardStaged = this.selectedCardIds.includes('resonance_shard');
    if (!shardStaged && needMore > 0) {
      this._setConfirmLabel(`還需選 ${needMore} 張`);
    } else {
      this._setConfirmLabel('確認出牌');
    }
    this._showBtn(this.confirmBtn);
  }

  // ---- Submit the currently staged cards ----
  _submitStagedCards() {
    const round = ROUNDS[this.currentRound];
    const hasShardStaged = this.selectedCardIds.includes('resonance_shard');
    if (!hasShardStaged && this.selectedCardIds.length < round.requiredCount) {
      this._showFeedback(`請再選 ${round.requiredCount - this.selectedCardIds.length} 張牌！`, '#ffaa44', 1200);
      return;
    }
    this._resolveRound([...this.selectedCardIds]);
  }

  // ---- Resolve a round with the submitted card IDs ----
  _resolveRound(submittedIds) {
    if (this.roundState !== 'selecting' || this.busy) return;
    this.roundState = 'resolving';
    this.busy = true;
    this._hideBtn(this.confirmBtn);
    this.tweens.killTweensOf(this.dropZoneBg);
    this.dropZoneBg.setAlpha(1);

    const round  = ROUNDS[this.currentRound];
    // Resonance shard is a wildcard — always correct for any round
    const result = submittedIds.length === 0 ? 'SKIP'
      : submittedIds.includes('resonance_shard') ? 'CORRECT'
      : evaluateSubmission(round, submittedIds);

    this.battleResults.push({ round: this.currentRound, submittedIds, result });

    // ---- Apply HP changes ----
    if (result === 'CORRECT') {
      this.enemyHP = Math.max(0, this.enemyHP - 1);
      this._updateHPDots('enemy', this.enemyHP);
      this._showFeedback('很好！成功反駁了這個想法！', '#44ff88');
      this._flashDropZone(0x0c2a18);
      // Shake elf to signal damage
      this.tweens.add({ targets: this.elfSprite, x: this.elfSprite.x + 10, duration: 60, yoyo: true, repeat: 4 });
    } else if (result === 'WRONG') {
      this.playerHP = Math.max(0, this.playerHP - 1);
      this._updateHPDots('player', this.playerHP);
      this._showFeedback('錯誤！請重新思考…', '#ff6666');
      this._flashDropZone(0x2a0c0c);
    } else {
      // SKIP — no HP changes
      this._showFeedback('沒有出牌，跳過此回合。', '#aaaaaa');
    }

    // On a wrong answer — return cards to hand and retry the same round
    if (result === 'WRONG') {
      // Clear staged flags so cards behave normally again
      this.selectedCardIds = [];
      this.stagedCards = [];
      this.cardObjects.forEach(c => { c._staged = false; c._dragging = false; });

      this.time.delayedCall(1600, () => {
        this.roundState = 'selecting';
        this.busy = false;
        // Reposition hand cards back to their home positions
        this.buildHandCards();
        this.dropZoneHint.setVisible(true);
        this._hideBtn(this.confirmBtn);
        // Restart the drop-zone pulse
        this.tweens.killTweensOf(this.dropZoneBg);
        this.tweens.add({
          targets: this.dropZoneBg,
          alpha: { from: 0.6, to: 1 }, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
      });
      return;
    }

    // Mark used cards (only for correct / skip)
    submittedIds.forEach(id => {
      const card = this.battleCards.find(c => c.id === id);
      if (card) this.usedCardIds.push(id);
    });

    // Clear staged state
    this.selectedCardIds = [];
    this.stagedCards = [];

    // Fade out submitted card objects
    this.cardObjects.filter(c => submittedIds.includes(c.cardData?.id))
      .forEach(c => {
        this.tweens.add({ targets: c, alpha: 0, scale: 0.5, duration: 350,
          onComplete: () => c.destroy() });
      });

    // Check win/lose immediately after HP update
    const gameOver = this.enemyHP <= 0 || this.playerHP <= 0;

    this.time.delayedCall(gameOver ? 1400 : 2200, () => {
      if (gameOver) {
        this.endBattle();
      } else {
        this.currentRound++;
        this.busy = false;
        this.startRound();
      }
    });
  }

  // ---- Start a round ----
  startRound() {
    if (this.currentRound >= ROUNDS.length) { this.endBattle(); return; }

    this.roundState = 'selecting';
    this.busy = false;
    this.selectedCardIds = [];
    this.stagedCards = [];

    const round = ROUNDS[this.currentRound];

    this.roundText.setText(`第 ${this.currentRound + 1} / ${ROUNDS.length} 回合`);
    this.thoughtText.setText(round.thought);
    this.thoughtLabel.setText(`【${round.techniqueLabel}】`);

    const need = round.requiredCount;
    this.instructionText.setText(
      need === 1 ? '將正確的證據卡拖入中央區域，按確認出牌' : `選擇 ${need} 張正確的證據卡，全部拖入後按確認`
    );

    this.dropZoneHint.setVisible(true);
    this._hideBtn(this.confirmBtn);

    // Pulse drop zone
    this.tweens.add({
      targets: this.dropZoneBg,
      alpha: { from: 0.6, to: 1 }, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
    });

    this.buildHandCards();

    this.tweens.add({
      targets: this.elfSprite, x: this.elfSprite.x - 6,
      duration: 60, yoyo: true, repeat: 3, ease: 'Sine.easeInOut'
    });
  }

  // ---- Build draggable hand cards at the bottom ----
  buildHandCards() {
    this.cardObjects.forEach(c => c.destroy());
    this.cardObjects = [];

    const { width, height } = this.scale;
    const available = this.battleCards.filter(c => !this.usedCardIds.includes(c.id));
    const cardW = 160, cardH = 220, gap = 24;
    if (available.length === 0) return;

    const totalW = available.length * cardW + (available.length - 1) * gap;
    const startX = (width - totalW) / 2 + cardW / 2;
    const cardY  = height - cardH / 2 - 20;

    available.forEach((card, i) => {
      const cx = startX + i * (cardW + gap);
      const container = this.add.container(cx, cardY).setDepth(10).setSize(cardW, cardH);
      container.cardData = card;
      container.homeX = cx;
      container.homeY = cardY;

      if (card.isResonance) {
        const bg = this.add.rectangle(0, 0, cardW, cardH, 0x1a1000, 0.95).setStrokeStyle(3, 0xffcc00, 1);
        const img = this.add.image(0, -30, 'starFragment').setDisplaySize(90, 90);
        container.add([bg, img,
          this.add.text(0, 40,  card.name, { fontFamily: '"Microsoft JhengHei", sans-serif', fontSize: '20px', color: '#ffee88', fontStyle: 'bold' }).setOrigin(0.5),
          this.add.text(0, 92, '永久 · 萬用', { fontFamily: '"Microsoft JhengHei", sans-serif', fontSize: '13px', color: '#aa8844' }).setOrigin(0.5)
        ]);
        this.tweens.add({ targets: [bg, img], alpha: { from: 0.85, to: 1 }, duration: 800, yoyo: true, repeat: -1 });
      } else {
        const key = 'card_' + card.id;
        if (this.textures.exists(key)) {
          container.add(this.add.image(0, 0, key).setDisplaySize(cardW, cardH));
        } else {
          const col = TYPE_COLORS[card.type] || 0x888888;
          container.add([
            this.add.rectangle(0, 0, cardW, cardH, 0x0f1428, 0.95).setStrokeStyle(2, col, 1),
            this.add.text(0, 0, card.name, { fontFamily: '"Microsoft JhengHei", sans-serif', fontSize: '20px', color: '#e0e0e0', fontStyle: 'bold' }).setOrigin(0.5)
          ]);
        }
      }

      container.setInteractive(new Phaser.Geom.Rectangle(-cardW / 2, -cardH / 2, cardW, cardH), Phaser.Geom.Rectangle.Contains);
      this.input.setDraggable(container);

      container.on('pointerover', () => {
        if (this.roundState !== 'selecting' || this.busy) return;
        this.tweens.add({ targets: container, y: cardY - 16, scale: 1.06, duration: 120 });
      });
      container.on('pointerout', () => {
        if (!container._dragging && !container._staged)
          this.tweens.add({ targets: container, y: cardY, scale: 1, duration: 120 });
      });

      container.setAlpha(0).setScale(0.85);
      this.tweens.add({ targets: container, alpha: 1, scale: 1, duration: 280, delay: i * 60, ease: 'Back.easeOut' });
      this.cardObjects.push(container);
    });
  }

  // ---- End the battle ----
  endBattle() {
    this.roundState = 'done';
    this.busy = true;
    this._hideBtn(this.confirmBtn);

    const playerWon   = this.enemyHP <= 0;
    const outcome     = playerWon ? '子傑恢復理智，負面能量消散了。' : '子傑仍被困住，精靈介入引導反思。';
    const title       = playerWon ? '勝利！' : '失敗';
    const titleColor  = playerWon ? '#66ffaa' : '#ff6666';
    const accentColor = playerWon ? 0x44cc88 : 0xcc4466;
    const correctCount = this.battleResults.filter(r => r.result === 'CORRECT').length;

    localStorage.setItem('battleResult', JSON.stringify({
      playerWon, correctCount, totalRounds: ROUNDS.length,
      results: this.battleResults
    }));

    const { width, height } = this.scale;
    this.tweens.add({ targets: this.resultOverlay, alpha: 0.75, duration: 700 });

    this.time.delayedCall(500, () => {
      if (playerWon) localStorage.setItem('afterShardCreate', 'chatbot.html');
      const nextUrl   = playerWon ? 'shard_create.html' : 'prepare.html';
      const nextLabel = playerWon ? '繼續 →' : '重新準備';

      const panelW = 860;
      const panelH = 420;
      const popup  = this.add.container(width / 2, height / 2 + 60).setDepth(45).setAlpha(0);

      const panelBg   = this.add.rectangle(0, 0, panelW, panelH, 0x07101e, 0.97)
        .setStrokeStyle(2, accentColor, 0.9);
      const accentBar = this.add.rectangle(0, -panelH / 2 + 4, panelW - 60, 4, accentColor, 1)
        .setOrigin(0.5, 0.5);

      const titleTxt = this.add.text(0, -panelH / 2 + 70, title, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '64px', color: titleColor, fontStyle: 'bold'
      }).setOrigin(0.5);

      const outcomeTxt = this.add.text(0, -panelH / 2 + 168, outcome, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '28px', color: '#99aabb'
      }).setOrigin(0.5);

      const scoreTxt = this.add.text(0, -panelH / 2 + 230,
        `正確回合: ${correctCount} / ${ROUNDS.length}  ·  敵方剩餘生命: ${this.enemyHP}  ·  玩家剩餘生命: ${this.playerHP}`, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '22px', color: '#a0c4ff'
      }).setOrigin(0.5);

      const btnBg  = this.add.rectangle(0, panelH / 2 - 66, 320, 64, 0x1a3a5c, 0.95)
        .setStrokeStyle(1, 0x4488cc, 0.8).setInteractive({ useHandCursor: true });
      const btnTxt = this.add.text(0, panelH / 2 - 66, nextLabel, {
        fontFamily: '"Microsoft JhengHei", sans-serif', fontSize: '28px', color: '#a0c4ff'
      }).setOrigin(0.5);

      popup.add([panelBg, accentBar, titleTxt, outcomeTxt, scoreTxt, btnBg, btnTxt]);
      this.tweens.add({ targets: popup, alpha: 1, y: height / 2, duration: 480, ease: 'Back.easeOut' });

      btnBg.on('pointerover', () => btnBg.setFillStyle(0x264d73, 1));
      btnBg.on('pointerout',  () => btnBg.setFillStyle(0x1a3a5c, 0.95));
      btnBg.on('pointerdown', () => { window.location.href = nextUrl; });
    });
  }

  // ---- Flash the drop zone briefly ----
  _flashDropZone(color) {
    this.tweens.add({ targets: this.dropZoneBg, fillColor: color, duration: 300, yoyo: true });
  }

  // ---- Show transient feedback text ----
  _showFeedback(text, color, duration = 1600) {
    this.feedbackText.setText(text).setColor(color).setAlpha(1).setY(720);
    this.tweens.add({ targets: this.feedbackText, alpha: 0, y: 680, duration: duration * 0.6, delay: duration * 0.4, ease: 'Sine.easeIn',
      onComplete: () => { this.feedbackText.y = 720; }
    });
  }

  // ---- Build a small text button ----
  _makeButton(x, y, label, callback) {
    const btn = this.add.container(x, y).setDepth(6);
    const bg  = this.add.rectangle(0, 0, 240, 56, 0x1a2a3c, 0.88)
      .setStrokeStyle(1, 0x446688, 0.6).setInteractive({ useHandCursor: true });
    const txt = this.add.text(0, 0, label, { fontFamily: '"Microsoft JhengHei", sans-serif', fontSize: '22px', color: '#7799aa' }).setOrigin(0.5);
    btn.add([bg, txt]);
    btn._label = txt;
    btn._bg = bg;
    bg.on('pointerover', () => bg.setFillStyle(0x263a50, 1));
    bg.on('pointerout',  () => bg.setFillStyle(0x1a2a3c, 0.88));
    bg.on('pointerdown', () => callback());
    return btn;
  }

  // ---- Update confirm button label text ----
  _setConfirmLabel(text) {
    if (this.confirmBtn && this.confirmBtn._label) this.confirmBtn._label.setText(text);
  }

  // ---- Show / hide a _makeButton container with proper input state ----
  _showBtn(btn) { btn.setVisible(true);  if (btn._bg) btn._bg.setInteractive({ useHandCursor: true }); }
  _hideBtn(btn) { btn.setVisible(false); if (btn._bg) btn._bg.disableInteractive(); }

  toggleMusic() {
    this.musicOn = !this.musicOn;
    this.musicBtn.setAlpha(this.musicOn ? 1 : 0.4);
    if (this.musicOn) {
      if (!this.bgm.isPlaying) {
        this.bgm.volume = 0; this.bgm.play();
        this.tweens.add({ targets: this.bgm, volume: 0.35, duration: 1500 });
        const fadeMs = 1400;
        this.bgmLoopTimer = this.time.delayedCall(
          Math.max(0, this.bgm.duration * 1000 - fadeMs), () => {
            this.tweens.killTweensOf(this.bgm);
            this.tweens.add({ targets: this.bgm, volume: 0, duration: fadeMs });
          });
      }
    } else {
      if (this.bgmLoopTimer) { this.bgmLoopTimer.destroy(); this.bgmLoopTimer = null; }
      this.tweens.killTweensOf(this.bgm);
      this.tweens.add({ targets: this.bgm, volume: 0, duration: 800, onComplete: () => { if (!this.musicOn) this.bgm.stop(); } });
    }
  }
}
