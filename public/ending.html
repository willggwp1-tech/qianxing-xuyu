<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牽星絮語 — 結局</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background: #060a14;
      color: #d0d8e8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-image {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url('assets/background/background.png') center/cover no-repeat;
      z-index: 0;
    }
    .page-wrapper {
      position: relative; z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2.4rem;
      color: #a0c4ff;
      letter-spacing: 0.2em;
      text-shadow: 0 0 24px rgba(120, 180, 255, 0.25);
    }
    header .subtitle {
      color: #5a6a7a;
      font-size: 0.88rem;
      margin-top: 0.4rem;
      letter-spacing: 0.08em;
    }

    /* --- Selector Section --- */
    .selector-section {
      background: rgba(12, 18, 36, 0.6);
      border: 1px solid rgba(100, 160, 255, 0.1);
      border-radius: 12px;
      padding: 1.4rem;
      margin-bottom: 1.5rem;
    }
    .selector-section h2 {
      font-size: 1rem;
      color: #7aafdb;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    .word-category { margin-bottom: 0.9rem; }
    .word-category .cat-label {
      font-size: 0.75rem; color: #506070;
      text-transform: uppercase; letter-spacing: 0.15em;
      margin-bottom: 0.4rem;
    }
    .word-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .word-btn {
      padding: 7px 16px;
      background: rgba(20, 35, 60, 0.7);
      border: 1px solid rgba(100, 160, 255, 0.15);
      border-radius: 4px;
      color: #8aa8c8; font-size: 0.9rem;
      cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .word-btn:hover {
      background: rgba(40, 70, 120, 0.6);
      color: #b0d0f0;
      border-color: rgba(100, 160, 255, 0.35);
    }
    .word-btn.selected {
      background: rgba(60, 110, 180, 0.5);
      border-color: #5a9fd4;
      color: #e0eeff;
      box-shadow: 0 0 8px rgba(90, 160, 220, 0.25);
    }

    .phrase-preview {
      margin-top: 1rem;
      padding: 10px 14px;
      background: rgba(8, 14, 28, 0.8);
      border: 1px solid rgba(100, 160, 255, 0.1);
      border-radius: 6px;
      min-height: 2.4rem;
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .phrase-text {
      font-size: 1.05rem; color: #a0c4ff;
      letter-spacing: 0.08em; flex: 1;
    }
    .phrase-text.empty { color: #3a4a5a; font-style: italic; }

    .submit-btn {
      padding: 7px 22px;
      background: rgba(50, 100, 170, 0.5);
      border: 1px solid rgba(100, 160, 255, 0.3);
      border-radius: 4px; color: #a0c4ff;
      font-size: 0.88rem; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
      white-space: nowrap;
    }
    .submit-btn:hover { background: rgba(70, 120, 200, 0.6); border-color: #6ab0e8; }
    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    /* --- Comments Section --- */
    .comments-section {
      background: rgba(12, 18, 36, 0.6);
      border: 1px solid rgba(100, 160, 255, 0.1);
      border-radius: 12px;
      padding: 1.4rem;
      margin-bottom: 2rem;
    }
    .comments-section h2 {
      font-size: 1rem; color: #7aafdb;
      margin-bottom: 0.8rem; letter-spacing: 0.1em;
    }
    .comments-list {
      overflow-y: auto; max-height: 340px;
      padding-right: 4px;
    }
    .comments-list::-webkit-scrollbar { width: 4px; }
    .comments-list::-webkit-scrollbar-track { background: transparent; }
    .comments-list::-webkit-scrollbar-thumb { background: rgba(100, 160, 255, 0.15); border-radius: 2px; }

    .comment-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(100, 160, 255, 0.06);
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-phrase { color: #b8d0ee; font-size: 0.9rem; margin-bottom: 3px; }
    .comment-meta  { font-size: 0.72rem; color: #4a5a6a; }
    .comment-meta .cm-user { color: #6a8aaa; }
    .no-comments { color: #3a4a5a; font-style: italic; font-size: 0.85rem; padding: 1rem 0; }

    /* --- Navigation --- */
    .nav-bar {
      text-align: center;
      display: flex; justify-content: center; gap: 1rem;
    }
    .nav-btn {
      display: inline-block; padding: 10px 32px;
      background: rgba(26, 58, 92, 0.7); color: #a0c4ff;
      text-decoration: none; border-radius: 6px; font-size: 0.95rem;
      transition: background 0.2s; border: 1px solid rgba(100, 160, 255, 0.12);
    }
    .nav-btn:hover { background: rgba(38, 77, 115, 0.8); }
  </style>
</head>
<body>
  <div class="bg-image"></div>

  <div class="page-wrapper">
    <header>
      <h1>結 局</h1>
      <div class="subtitle">在星空下留下你的絮語</div>
    </header>

    <!-- Nier-inspired word selector -->
    <div class="selector-section">
      <h2>⟡ 留下絮語</h2>
      <div id="word-selector"></div>
      <div class="phrase-preview">
        <span class="phrase-text empty" id="phrase-preview">選擇詞語以組成留言…</span>
        <button class="submit-btn" id="submit-btn" disabled>送出</button>
      </div>
    </div>

    <!-- Comments feed -->
    <div class="comments-section">
      <h2>⟡ 星塵留言</h2>
      <div class="comments-list" id="comments-list">
        <div class="no-comments">載入中…</div>
      </div>
    </div>

    <div class="nav-bar">
      <a class="nav-btn" href="chapter2.html">← 返回</a>
      <a class="nav-btn" href="start.html">⟳ 重新開始</a>
    </div>
  </div>

<script>
const CURRENT_USER_ID = localStorage.getItem('username') || 'guest';

const WORD_CATEGORIES = [
  { label: '主詞', words: ['我', '你', '我們', '大家', '星辰', '命運'] },
  { label: '動詞', words: ['希望', '感謝', '祝福', '陪伴', '守護', '牽引'] },
  { label: '受詞', words: ['你', '我', '彼此', '世界', '未來', '星空'] }
];

const selections = [null, null, null];

// --- Selector ---
function buildSelector() {
  const container = document.getElementById('word-selector');
  container.innerHTML = '';
  WORD_CATEGORIES.forEach((cat, catIdx) => {
    const div = document.createElement('div');
    div.className = 'word-category';
    const label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = cat.label;
    div.appendChild(label);
    const row = document.createElement('div');
    row.className = 'word-row';
    cat.words.forEach(word => {
      const btn = document.createElement('button');
      btn.className = 'word-btn';
      btn.textContent = word;
      btn.addEventListener('click', () => selectWord(catIdx, word, row));
      row.appendChild(btn);
    });
    div.appendChild(row);
    container.appendChild(div);
  });
}

function selectWord(catIdx, word, row) {
  row.querySelectorAll('.word-btn').forEach(b => b.classList.remove('selected'));
  const clicked = [...row.querySelectorAll('.word-btn')].find(b => b.textContent === word);
  if (clicked) clicked.classList.add('selected');
  selections[catIdx] = word;
  updatePreview();
}

function updatePreview() {
  const preview = document.getElementById('phrase-preview');
  const btn = document.getElementById('submit-btn');
  const filled = selections.filter(Boolean);
  if (filled.length === 0) {
    preview.textContent = '選擇詞語以組成留言…';
    preview.classList.add('empty');
    btn.disabled = true;
  } else {
    preview.textContent = selections.map(s => s || '＿').join(' ');
    preview.classList.toggle('empty', filled.length < 3);
    btn.disabled = filled.length < 3;
  }
}

// --- Comments ---
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function relativeTime(dateStr) {
  const diff = Math.max(0, Date.now() - new Date(dateStr).getTime());
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return '剛剛';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + ' 分鐘前';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + ' 小時前';
  return Math.floor(hr / 24) + ' 天前';
}

async function loadComments() {
  const list = document.getElementById('comments-list');
  try {
    const res = await fetch('/api/comments');
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = '<div class="no-comments">尚無留言，成為第一位留言者吧。</div>';
      return;
    }
    list.innerHTML = data.map(c => `
      <div class="comment-item">
        <div class="comment-phrase">${escapeHtml(c.phrase)}</div>
        <div class="comment-meta">
          <span class="cm-user">${escapeHtml(c.username)}</span> · ${relativeTime(c.timestamp)}
        </div>
      </div>
    `).join('');
  } catch {
    list.innerHTML = '<div class="no-comments">無法載入留言。</div>';
  }
}

async function submitComment() {
  const phrase = selections.join(' ');
  if (selections.filter(Boolean).length < 3) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await fetch('/api/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phrase, userId: CURRENT_USER_ID })
    });
    if (res.ok) {
      selections.fill(null);
      document.querySelectorAll('.word-btn').forEach(b => b.classList.remove('selected'));
      updatePreview();
      await loadComments();
    }
  } catch {}
  btn.textContent = '送出';
}

// --- Init ---
document.addEventListener('DOMContentLoaded', () => {
  buildSelector();
  updatePreview();
  document.getElementById('submit-btn').addEventListener('click', submitComment);
  loadComments();
});
</script>
</body>
</html>
