<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牽星絮語 — 註冊 / 登入</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: #0b0e1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Full-screen background image */
    .bg-image {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url('assets/background/background.png') center/cover no-repeat;
      z-index: 0;
    }
    .page-title {
      position: relative; z-index: 1;
      text-align: center;
      margin-bottom: 2rem;
    }
    .page-title h1 {
      font-size: 2.4rem;
      color: #a0c4ff;
      letter-spacing: 3px;
    }
    .page-title .subtitle {
      color: #667799;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    .cards-wrapper {
      position: relative; z-index: 1;
      display: flex;
      gap: 2rem;
      align-items: stretch;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 380px; max-width: 90vw;
      background:  linear-gradient(0deg,rgb(205, 227, 255) 0%,  rgb(231, 184, 251) 100%);;
      border: 1px solid rgba(160, 196, 255, 0.15);
      border-radius: 16px;
      padding: 2.2rem 2rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(100, 160, 255, 0.08);
    }

    .card-title {
      font-family: 'Comfortaa', 'Fredoka One', cursive;
      font-size: 2.5rem;
      font-weight: normal;
      text-align: center;
      color: #4d6ea4;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }

    .field {
      margin-bottom: 1.2rem;
    }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 300;
      color: #693c77;
      margin-bottom: 0.4rem;
      letter-spacing: 1px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(179, 152, 213, 0.748);
      border: 1px solid rgba(160, 196, 255, 0.2);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }
    .field input:focus {
      border-color: #a0c4ff;
      box-shadow: 0 0 8px rgba(160, 196, 255, 0.15);
    }
    .field input::placeholder {
      color: #445566;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #1a3a5c, #264d73);
      color: #a0c4ff;
      border: 1px solid rgba(160, 196, 255, 0.25);
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 300;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .submit-btn:hover {
      background: linear-gradient(135deg, #264d73, #2e6090);
      box-shadow: 0 0 16px rgba(160, 196, 255, 0.2);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Message toast */
    .message {
      margin-top: 1rem;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .message.error {
      display: block;
      background: rgba(255, 80, 80, 0.12);
      color: #ff6b6b;
      border: 1px solid rgba(255, 80, 80, 0.2);
    }
    .message.success {
      display: block;
      background: rgba(80, 255, 140, 0.12);
      color: #6bffb0;
      border: 1px solid rgba(80, 255, 140, 0.2);
    }

    .nav {
      position: relative; z-index: 1;
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .nav-btn {
      display: inline-block;
      padding: 8px 24px;
      background: transparent;
      color: #667799;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      border: 1px solid rgba(160, 196, 255, 0.1);
      transition: all 0.2s;
    }
    .nav-btn:hover {
      background: rgba(160, 196, 255, 0.08);
      color: #a0c4ff;
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-image"></div>

  <div class="page-title">
    <h1>牽星絮語</h1>
  </div>

  <div class="cards-wrapper">
    <!-- Login Card -->
    <div class="card">
      <h2 class="card-title">登入</h2>
      <form id="login-form">
        <div class="field">
          <label for="login-username">使用者名稱</label>
          <input type="text" id="login-username" placeholder="輸入用戶名稱" required autocomplete="username">
        </div>
        <div class="field">
          <label for="login-password">密碼 </label>
          <input type="password" id="login-password" placeholder="輸入密碼" required autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn">登入 </button>
      </form>
      <div id="login-msg" class="message"></div>
    </div>

    <!-- Register Card -->
    <div class="card">
      <h2 class="card-title">註冊 </h2>
      <form id="register-form">
        <div class="field">
          <label for="reg-username">使用者名稱 </label>
          <input type="text" id="reg-username" placeholder="輸入用戶名稱" required minlength="2" maxlength="24" autocomplete="username">
        </div>
        <div class="field">
          <label for="reg-email">電子信箱 </label>
          <input type="email" id="reg-email" placeholder="輸入電子信箱" required autocomplete="email">
        </div>
        <div class="field">
          <label for="reg-password">密碼 </label>
          <input type="password" id="reg-password" placeholder="至少 6 個字元" required minlength="6" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="reg-confirm">確認密碼 </label>
          <input type="password" id="reg-confirm" placeholder="再次輸入密碼" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn">註冊 </button>
      </form>
      <div id="register-msg" class="message"></div>
    </div>
  </div>

  <div class="nav">
    <a class="nav-btn" href="start.html">返回</a>
  </div>

  <script>
    function showMessage(elementId, text, type) {
      const el = document.getElementById(elementId);
      el.textContent = text;
      el.className = 'message ' + type;
    }

    // Register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (password !== confirm) {
        showMessage('register-msg', '密碼不一致 Passwords do not match', 'error');
        return;
      }

      const btn = e.target.querySelector('.submit-btn');
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          showMessage('register-msg', '註冊成功！請在左方登入 Registered! Please log in.', 'success');
        } else {
          showMessage('register-msg', data.error || '註冊失敗 Registration failed', 'error');
        }
      } catch (err) {
        showMessage('register-msg', '伺服器錯誤 Server error', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      const btn = e.target.querySelector('.submit-btn');
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          showMessage('login-msg', '登入成功！Logged in!', 'success');
          // Store user info
          localStorage.setItem('user', JSON.stringify(data.user));
          // Check saved progress to redirect to the right page
          try {
            const progRes = await fetch('/api/progress/load?username=' + encodeURIComponent(data.user.username));
            const prog = await progRes.json();
            if (prog.found && prog.currentPage) {
              setTimeout(() => { window.location.href = prog.currentPage; }, 1000);
            } else {
              setTimeout(() => { window.location.href = 'prologue.html'; }, 1000);
            }
          } catch {
            setTimeout(() => { window.location.href = 'prologue.html'; }, 1000);
          }
        } else {
          showMessage('login-msg', data.error || '登入失敗 Login failed', 'error');
        }
      } catch (err) {
        showMessage('login-msg', '伺服器錯誤 Server error', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
