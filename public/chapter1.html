  { speaker: '', text: '看到帳本數目增加了幾次後，最後有幾筆大支出把一大半存款掏空了。' },
  { speaker: '', text: '這時我才理解到媽媽剛才的話是什麼意思。' },

  { speaker: '', text: '得知這一切之後的我心情很沈重，既知道子傑努力學習但表現不佳且背負著重大壓力，又知道媽媽在背後對子傑的感情以及負擔。' },
  { speaker: '摩耳菲婭', text: '這些應該足夠讓迷途的子傑清醒過來了，我們回去找他吧。' },

  { speaker: '', text: '回到學校且找到子傑。', bg: 'ch1_2' },

// ---- Progress helpers ----
const CURRENT_PAGE = 'chapter1.html';

function getUsername() {
  try {
    const user = JSON.parse(localStorage.getItem('user'));
    return user ? user.username : null;
  } catch { return null; }
}

function saveProgress(dialogueIndex) {
  const username = getUsername();
  if (!username) return;
  fetch('/api/progress/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, currentPage: CURRENT_PAGE, dialogueIndex })
  }).catch(() => {});
}

async function loadProgress() {
  const username = getUsername();
  if (!username) return null;
  try {
    const res = await fetch('/api/progress/load?username=' + encodeURIComponent(username));
    const data = await res.json();
    if (data.found && data.currentPage === CURRENT_PAGE) return data.dialogueIndex;
  } catch {}
  return null;
}

// ---- Phaser scene ----
class Chapter1Scene extends Phaser.Scene {
  constructor() {
    super('Chapter1Scene');
    this.dialogueIndex = 0;
    this.isTyping = false;
    this.typeTimer = null;
    this.choiceMode = false;
  }

  preload() {
    // Chapter 1 illustrations
    this.load.image('ch1_1', 'assets/illustration_draft/chapter1/chapter1.1.png');
    this.load.image('ch1_2', 'assets/illustration_draft/chapter1/chapter1.2.png');
    this.load.image('ch1_3', 'assets/illustration_draft/chapter1/chapter1.3.png');
    this.load.image('dialogBox', 'assets/UI/dialog_box.PNG');
  }

  create() {
    const { width, height } = this.scale;

    // --- Background ---
    this.bg = this.add.image(width / 2, height / 2, 'ch1_1');
    this.fitBackground(this.bg);

    // --- Blackout overlay ---
    this.blackOverlay = this.add.rectangle(width / 2, height / 2, width, height, 0x000000).setAlpha(0).setDepth(1);

    // --- Dialogue box (bottom of screen) ---
    const boxH = 306;
    const boxY = height - boxH;
    this.dialogueBox = this.add.image(width / 2, boxY + boxH / 2, 'dialogBox').setDepth(10);
    this.dialogueBox.setDisplaySize(width, boxH);

    // Speaker name
    this.speakerText = this.add.text(72, boxY + 25, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '36px',
      color: '#a0c4ff',
      fontStyle: 'bold'
    }).setDepth(11);

    // Dialogue text
    this.dialogueText = this.add.text(72, boxY + 80, '', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '32px',
      color: '#e0e0e0',
      wordWrap: { width: width - 144 },
      lineSpacing: 10
    }).setDepth(11);

    // Continue hint
    this.continueHint = this.add.text(width - 72, height - 32, '▶ 點擊繼續', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '25px',
      color: '#6688aa'
    }).setOrigin(1, 1).setDepth(11);

    // Evidence flash overlay (gold tint for evidence lines)
    this.evidenceFlash = this.add.rectangle(width / 2, boxY + boxH / 2, width, boxH, 0xffcc00, 0).setDepth(9);

    this.choiceButtons = [];

    // --- Input ---
    this.input.on('pointerdown', () => this.advance());
    this.input.keyboard.on('keydown-SPACE', () => this.advance());

    // --- Load saved progress or start from beginning ---
    loadProgress().then(savedIndex => {
      if (savedIndex != null && savedIndex > 0 && savedIndex < DIALOGUE.length) {
        for (let i = 0; i < savedIndex; i++) {
          const e = DIALOGUE[i];
          if (e.bg) { this.bg.setTexture(e.bg); this.fitBackground(this.bg); }
          if (e.blackout === true) this.blackOverlay.setAlpha(1);
          else if (e.blackout === false) this.blackOverlay.setAlpha(0);
        }
        this.dialogueIndex = savedIndex;
      }
      this.showLine();
    });
  }

  fitBackground(img) {
    const { width, height } = this.scale;
    const scale = Math.max(width / img.width, height / img.height);
    img.setScale(scale);
  }

  /* Display current dialogue line with typewriter effect */
  showLine() {
    const entry = DIALOGUE[this.dialogueIndex];
    if (!entry) return;

    // Auto-save progress
    saveProgress(this.dialogueIndex);

    // Background change
    if (entry.bg) {
      this.bg.setTexture(entry.bg);
      this.fitBackground(this.bg);
    }

    // Blackout
    if (entry.blackout === true) {
      this.blackOverlay.setAlpha(1);
    } else if (entry.blackout === false) {
      this.blackOverlay.setAlpha(0);
    }

    // Evidence highlight flash
    if (entry.evidence) {
      this.tweens.add({
        targets: this.evidenceFlash,
        alpha: { from: 0.15, to: 0 },
        duration: 800,
        ease: 'Sine.easeOut'
      });
    }

    // Speaker
    this.speakerText.setText(entry.speaker ? `【${entry.speaker}】` : '');

    // Typewriter
    this.dialogueText.setText('');
    this.continueHint.setVisible(false);
    this.isTyping = true;
    let charIndex = 0;
    const fullText = entry.text;

    if (this.typeTimer) this.typeTimer.destroy();
    this.typeTimer = this.time.addEvent({
      delay: 35,
      repeat: fullText.length - 1,
      callback: () => {
        charIndex++;
        this.dialogueText.setText(fullText.substring(0, charIndex));
        if (charIndex >= fullText.length) {
          this.isTyping = false;
          this.onLineComplete(entry);
        }
      }
    });
  }

  onLineComplete(entry) {
    if (entry.choices) {
      this.showChoices(entry.choices);
    } else if (entry.end) {
      this.continueHint.setText('▶ 前往準備界面').setVisible(true);
      this.continueHint.setInteractive({ useHandCursor: true });
      this.continueHint.once('pointerdown', () => {
        const username = getUsername();
        if (username) {
          fetch('/api/progress/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, currentPage: 'prepare.html', dialogueIndex: 0 })
          }).finally(() => { window.location.href = 'prepare.html'; });
        } else {
          window.location.href = 'prepare.html';
        }
      });
    } else {
      this.continueHint.setText('▶ 點擊繼續').setVisible(true);
    }
  }

  showChoices(choices) {
    this.choiceMode = true;
    this.continueHint.setVisible(false);
    const { width, height } = this.scale;
    const boxY = height - 306;
    const startY = boxY - 70;

    choices.forEach((text, i) => {
      const btnX = width / 1.4;
      const btnY = startY + i * 80;
      const btnBg = this.add.rectangle(btnX, btnY, 720, 64, 0x1a3a5c, 0.9)
        .setDepth(12).setInteractive({ useHandCursor: true });
      const btnText = this.add.text(btnX, btnY, `${i + 1}. ${text}`, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '30px',
        color: '#a0c4ff'
      }).setOrigin(0.5).setDepth(13);

      btnBg.on('pointerover', () => btnBg.setFillStyle(0x264d73, 1));
      btnBg.on('pointerout', () => btnBg.setFillStyle(0x1a3a5c, 0.9));
      btnBg.on('pointerdown', () => {
        this.clearChoices();
        this.choiceMode = false;
        this.dialogueIndex++;
        this.showLine();
      });
      this.choiceButtons.push(btnBg, btnText);
    });
  }

  clearChoices() {
    this.choiceButtons.forEach(obj => obj.destroy());
    this.choiceButtons = [];
  }

  advance() {
    if (this.choiceMode) return;

    if (this.isTyping) {
      if (this.typeTimer) this.typeTimer.destroy();
      const entry = DIALOGUE[this.dialogueIndex];
      this.dialogueText.setText(entry.text);
      this.isTyping = false;
      this.onLineComplete(entry);
      return;
    }

    const entry = DIALOGUE[this.dialogueIndex];
    if (entry && entry.end) return;

    this.dialogueIndex++;
    if (this.dialogueIndex < DIALOGUE.length) {
      this.showLine();
    }
  }
}

// ---- Phaser config ----
const config = {
  type: Phaser.AUTO,
  width: 1920,
  height: 1080,
  parent: document.body,
  backgroundColor: '#000000',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [Chapter1Scene]
};

const game = new Phaser.Game(config);
</script>
