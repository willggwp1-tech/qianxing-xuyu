// ---- Progress helpers ----
const CURRENT_PAGE = 'chapter1.html';

function getUsername() {
  try {
    const user = JSON.parse(localStorage.getItem('user'));
    return user ? user.username : null;
  } catch { return null; }
}

function saveProgress(dialogueIndex) {
  const username = getUsername();
  if (!username) return;
  fetch('/api/progress/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, currentPage: CURRENT_PAGE, dialogueIndex })
  }).catch(() => {});
}

async function loadProgress() {
  const username = getUsername();
  if (!username) return null;
  try {
    const res = await fetch('/api/progress/load?username=' + encodeURIComponent(username));
    const data = await res.json();
    if (data.found && data.currentPage === CURRENT_PAGE) return data.dialogueIndex;
  } catch {}
  return null;
}

          this.tweens.add({ targets: this.bgm, volume: 0, duration: fadeMs, ease: 'Linear' });
        });

    this.bgm.on('complete', () => { this.bgmLoopTimer = null; playBgm(); });

    this.evidenceCounterBg.on('pointerover', () => this.evidenceCounterBg.setStrokeStyle(2, 0x88ccff, 0.9));
    this.evidenceCounterBg.on('pointerout', () => this.evidenceCounterBg.setStrokeStyle(1, 0x4488cc, 0.6));

    this.shardCounterBg = this.add.rectangle(width - 88, 88, 180, 44, 0x0a0a20, 0.85)

    // Schedule floating shard spawn (3–8 s after chapter starts)
    this.scheduleShardSpawn();

    // --- Load saved progress or start from beginning ---
    loadProgress().then(savedIndex => {
      if (savedIndex != null && savedIndex > 0 && savedIndex < DIALOGUE.length) {
        for (let i = 0; i < savedIndex; i++) {
          const e = DIALOGUE[i];
          if (e.bg) { this.bg.setTexture(e.bg); this.fitBackground(this.bg); }
          if (e.blackout === true) this.blackOverlay.setAlpha(1);
          else if (e.blackout === false) this.blackOverlay.setAlpha(0);

      this.showLine();

  // ============================================================
  // Resonance Shard system
  // ============================================================

  // ---- Skip to a target dialogue index ----
  skipToLine(targetIndex) {
    // Clean up all active UI state
    if (this.typeTimer) { this.typeTimer.destroy(); this.typeTimer = null; }
    if (this.autoplayTimer) { this.autoplayTimer.destroy(); this.autoplayTimer = null; }
    this.clearChoices();
    this.clearPopup();
    this.deactivateHotzone();
    // Destroy any multi-hotzones
    Object.values(this.multiHotzoneGlows).forEach(objs => {
      objs.forEach(o => { this.tweens.killTweensOf(o); o.destroy(); });
    });
    this.multiHotzoneGlows = {};
    this.pendingMultiHotzones = new Set();
    this.multiHotzoneSkip = 0;
    this.collecting = false;
    this.choiceMode = false;
    this.isTyping = false;
    this.continueHint.setVisible(false).disableInteractive();

    // Replay bg/blackout states up to target
    for (let i = 0; i < targetIndex; i++) {
      const e = DIALOGUE[i];
      if (e.bg) { this.bg.setTexture(e.bg); this.fitBackground(this.bg); }
      if (e.blackout === true) this.blackOverlay.setAlpha(1);
      else if (e.blackout === false) this.blackOverlay.setAlpha(0);
      // Auto-collect any autoCollect evidence along the way
      if (e.evidence && e.autoCollect && e.evidenceId && !this.collectedEvidence.includes(e.evidenceId)) {
        this.collectedEvidence.push(e.evidenceId);
      }
    }
    this.updateEvidenceCounter();

    // Hide skip button once used
    this.skipBtn.setVisible(false);

    this.dialogueIndex = targetIndex;
    this.showLine();
  }

  // ---- Schedule one shard spawn per chapter ----
  scheduleShardSpawn() {
    if (this.shardSpawned) return;
    const delayMs = Phaser.Math.Between(3000, 8000);
    this.shardSpawnTimer = this.time.delayedCall(delayMs, () => {
      this.fetchAndSpawnShard();
    });
  }

  // ---- Fetch a random public shard from server then spawn it ----
  fetchAndSpawnShard() {
    if (this.shardSpawned || this.shardCollected) return;
    const username = getUsername() || '';
    fetch(`/api/fragments/random?username=${encodeURIComponent(username)}`)
      .then(r => r.json())
      .then(data => {
        if (data.found) {
          this.shardData = { inscription: data.shard.inscription, creatorName: data.shard.creatorName };
          this.spawnFloatingShard();
        }
        // If no public shards exist, don't spawn anything
      })
      .catch(() => {
        // On error, don't spawn
      });
  }

  // ---- Spawn the floating shard object ----
  spawnFloatingShard() {
    if (this.shardSpawned) return;
    this.shardSpawned = true;

    const { width, height } = this.scale;
    const startX = width + 80;
    const baseY  = Phaser.Math.Between(200, height - 400);

    // Container (no setInteractive — hit-testing is done via pointer distance in scene handler)
    const shard = this.add.container(startX, baseY).setDepth(18).setSize(110, 110);

    // Crystal image
    const img = this.add.image(0, 0, 'starFragment').setDisplaySize(100, 100);
    shard.add(img);

    // Cursor-hint: show pointer cursor when hovering near (handled via the scene pointer-move)
    this.input.on('pointermove', (pointer) => {
      if (!this.shardObject || this.shardCollected) return;
      const dx = pointer.x - this.shardObject.x;
      const dy = pointer.y - this.shardObject.y;
      this.game.canvas.style.cursor = (Math.sqrt(dx*dx + dy*dy) < 64) ? 'pointer' : '';
    });

    // Pulse alpha
    this.tweens.add({
      targets: shard, alpha: { from: 0.65, to: 1 },
      duration: 950, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
    });

    // Gentle random rotation sway
    this.tweens.add({
      targets: shard,
      angle: { from: Phaser.Math.Between(-10, -3), to: Phaser.Math.Between(3, 10) },
      duration: Phaser.Math.Between(1100, 1700),
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
    });

    // X drift: linear right → left over 10 s
    this.shardDriftTween = this.tweens.add({
      targets: shard,
      x: -80, duration: 10000, ease: 'Linear',
      onComplete: () => {
        shard.destroy();
        this.shardObject = null;
        this.game.canvas.style.cursor = '';
      }
    });

    // Y random bobbing: chain short random-target tweens for unpredictable up/down drift
    const bobY = () => {
      if (!shard.active) return;
      const targetY = Phaser.Math.Clamp(
        baseY + Phaser.Math.Between(-130, 130),
        120, height - 280
      );
      this.tweens.add({
        targets: shard,
        y: targetY,
        duration: Phaser.Math.Between(700, 1600),
        ease: 'Sine.easeInOut',
        onComplete: bobY
      });
    };
    bobY();

    this.shardObject = shard;
  }

  // ---- Player clicks the shard ----
  collectShard(shardObj) {
    if (this.shardCollected) return;
    this.shardCollected = true;
    this.game.canvas.style.cursor = '';

    // Stop drift and bobbing
    if (this.shardDriftTween) { this.shardDriftTween.stop(); this.shardDriftTween = null; }
    this.tweens.killTweensOf(shardObj);

    // Show info popup first — player confirms collection
    this.showShardInfoPopup(() => {
      const { width } = this.scale;
      this.tweens.add({
        targets: shardObj,
        x: width - 88, y: 88, scale: 0.3, alpha: 0,
        duration: 600, ease: 'Cubic.easeIn',
        onComplete: () => {
          shardObj.destroy();
          this.shardObject = null;
          this.onShardArrived();
        }
      });
      this.spawnShardParticles(shardObj.x, shardObj.y);
      try {
        const sfx = this.sound.get('shardCollect');
        if (sfx) sfx.play({ volume: 0.6 });
        else if (this.sound.context) {
          const snd = this.sound.add('shardCollect', { volume: 0.6 });
          snd.play();
        }
      } catch (_) {}
    });
  }

    }).setOrigin(0.5).setDepth(28);
    popupObjs.push(btnBg, btnTxt);

    btnBg.on('pointerover', () => btnBg.setFillStyle(0x2d1a60, 1));
    btnBg.on('pointerout',  () => btnBg.setFillStyle(0x1a1040, 1));
    btnBg.once('pointerdown', () => {
      this.shardPopupOpen = false;
      popupObjs.forEach(o => { this.tweens.killTweensOf(o); o.destroy(); });
      onCollect();
    });

    // Fade in all elements
    popupObjs.forEach(o => o.setAlpha(0));
    this.tweens.add({ targets: popupObjs, alpha: 1, duration: 300, ease: 'Sine.easeOut' });
  }

  // ---- Called after shard flies to counter ----
  onShardArrived() {
    // Update counter
    this.shardCounterText.setText('星魂碎片: 1');
    this.tweens.add({ targets: this.shardCounterBg, scaleX: 1.15, scaleY: 1.15, duration: 200, yoyo: true });
    this.tweens.add({ targets: this.shardCounterText, alpha: { from: 0.4, to: 1 }, duration: 300 });

    // Persist shard data in localStorage so duel can use it
    if (this.shardData) {
      localStorage.setItem('collectedShard', JSON.stringify(this.shardData));
    }

    // Record collection on server (fire and forget)
    const username = getUsername();
    if (username && this.shardData) {
      fetch('/api/fragments/collect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username,
          inscription: this.shardData.inscription,
          creatorName: this.shardData.creatorName,
          chapter: 1
        })
      }).catch(() => {});
    }
  }

  // ---- Simple particle burst on collection ----
  spawnShardParticles(x, y) {
    for (let i = 0; i < 10; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(4, 10), 0xcc99ff, 1).setDepth(19);
      const angle = Math.random() * Math.PI * 2;
      const dist  = Phaser.Math.Between(40, 120);
      this.tweens.add({
        targets: p,
        x: x + Math.cos(angle) * dist,
        y: y + Math.sin(angle) * dist,
        alpha: 0, scale: 0.2,
        duration: Phaser.Math.Between(400, 800),
        ease: 'Sine.easeOut',
        onComplete: () => p.destroy()
      });
    }
  }

  // ============================================================
  fitBackground(img) {
    const { width, height } = this.scale;
    const scale = Math.max(width / img.width, height / img.height);
    img.setScale(scale);
  }

  /* Display current dialogue line with typewriter effect */
  showLine() {
    const entry = DIALOGUE[this.dialogueIndex];
    if (!entry) return;

    // Auto-save progress
    saveProgress(this.dialogueIndex);

    // Background change
    if (entry.bg) {
      this.bg.setTexture(entry.bg);
      this.fitBackground(this.bg);
    }

    // Blackout
    if (entry.blackout === true) {
      this.blackOverlay.setAlpha(1);
    } else if (entry.blackout === false) {
      this.blackOverlay.setAlpha(0);
    }

    // Evidence highlight flash
    if (entry.evidence) {
      this.tweens.add({
        targets: this.evidenceFlash,
        alpha: { from: 0.15, to: 0 },
        duration: 800,
        ease: 'Sine.easeOut'
      });
    }

    // Speaker
    this.speakerText.setText(entry.speaker ? `【${entry.speaker}】` : '');

    // Typewriter
    this.dialogueText.setText('');
    this.continueHint.setVisible(false).disableInteractive();
    this.continueHint.removeAllListeners('pointerover');
    this.continueHint.removeAllListeners('pointerout');
    this.isTyping = true;
    let charIndex = 0;
    const fullText = entry.text;

    if (this.typeTimer) this.typeTimer.destroy();
    this.typeTimer = this.time.addEvent({
      delay: 35,
      repeat: fullText.length - 1,
      callback: () => {
        charIndex++;
        this.dialogueText.setText(fullText.substring(0, charIndex));
        if (charIndex >= fullText.length) {
          this.isTyping = false;
          this.onLineComplete(entry);
        }
      }
    });
  }

  onLineComplete(entry) {
    // Handle multi-hotzone (several evidence items shown simultaneously)
    if (entry.multiHotzone && entry.multiHotzone.length > 0) {
      this.activateMultiHotzones(entry.multiHotzone, entry.multiHotzoneSkip || 0);
      return;
    }
    // Handle evidence collection before choice/continue logic
    if (entry.evidence && entry.evidenceId) {
      if (entry.autoCollect) {
        // Auto-collect: show popup but no visual hotzone
        this.collectEvidence(entry.evidenceId);
        return; // popup will resume flow
      } else {
        // Activate a hotzone for click-to-collect
        this.activateHotzone(entry.evidenceId);
        return; // hotzone click will resume flow after popup
      }
    }

    if (entry.choices) {
      this.showChoices(entry.choices);
    } else if (entry.end) {
      this.continueHint.setVisible(true).setInteractive({ useHandCursor: true });
      this.continueHint.on('pointerover', () => this.continueHint.setTint(0xaad4ff));
      this.continueHint.on('pointerout', () => this.continueHint.clearTint());
      this.continueHint.once('pointerdown', () => {
        localStorage.setItem('collectedEvidence', JSON.stringify(this.collectedEvidence));
        const username = getUsername();
        if (username) {
          fetch('/api/progress/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, currentPage: 'prepare.html', dialogueIndex: 0 })
          }).finally(() => { window.location.href = 'prepare.html'; });
        } else {
          window.location.href = 'prepare.html';
        }
      });
    } else {
      this.continueHint.setVisible(true).setInteractive({ useHandCursor: true });
      this.continueHint.on('pointerover', () => this.continueHint.setTint(0xaad4ff));
      this.continueHint.on('pointerout', () => this.continueHint.clearTint());
      if (this.autoplay) this.scheduleAutoAdvance();
    }
  }

  // ---- Activate multiple hotzones simultaneously ----
  activateMultiHotzones(ids, skipCount) {
    this.collecting = true;  // block advance until all collected
    this.pendingMultiHotzones = new Set(ids);
    this.multiHotzoneSkip = skipCount;
    this.multiHotzoneGlows = {};
    this.continueHint.setVisible(false).disableInteractive();

    ids.forEach(evidenceId => {
      const coords = HOTZONE_COORDS[evidenceId];
      if (!coords) return;
      const evDef = ALL_EVIDENCE.find(e => e.id === evidenceId);
      const name = evDef ? evDef.name : evidenceId;

      // Pulsing gold outline
      const glow = this.add.rectangle(coords.x, coords.y, coords.w, coords.h)
        .setStrokeStyle(3, 0xffcc00, 0.7)
        .setFillStyle(0xffcc00, 0.08)
        .setDepth(15);
      this.tweens.add({
        targets: glow, alpha: { from: 0.5, to: 1 },
        duration: 700, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });

      // Label floating above the hotzone
      const label = this.add.text(coords.x, coords.y - coords.h / 2 - 12, name, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '22px', color: '#ffee44',
        stroke: '#000000', strokeThickness: 4
      }).setOrigin(0.5, 1).setDepth(16);

      // Invisible interactive zone
      const zone = this.add.zone(coords.x, coords.y, coords.w, coords.h)
        .setInteractive({ useHandCursor: true })
        .setDepth(17);
      zone.once('pointerdown', () => this.onMultiHotzoneClick(evidenceId));

      this.multiHotzoneGlows[evidenceId] = [glow, label, zone];
    });
  }

  // ---- A hotzone in a multi-set was clicked ----
  onMultiHotzoneClick(evidenceId) {
    // Remove just this hotzone's visuals
    const objs = this.multiHotzoneGlows[evidenceId];
    if (objs) {
      objs.forEach(obj => { this.tweens.killTweensOf(obj); obj.destroy(); });
      delete this.multiHotzoneGlows[evidenceId];
    }
    this.pendingMultiHotzones.delete(evidenceId);
    // Show collection popup; resumeAfterCollection decides what to do next
    this.collectEvidence(evidenceId);
  }

  // ---- Activate a click-to-collect hotzone ----
  activateHotzone(evidenceId) {
    this.deactivateHotzone(); // clear any existing
    const coords = HOTZONE_COORDS[evidenceId];
    if (!coords) return;

    // Subtle glow hint
    this.activeHotzoneGlow = this.add.rectangle(coords.x, coords.y, coords.w, coords.h)
      .setStrokeStyle(3, 0xffcc00, 0.7)
      .setFillStyle(0xffcc00, 0.08)
      .setDepth(15);
    // Pulse animation
    this.tweens.add({
      targets: this.activeHotzoneGlow,
      alpha: { from: 0.5, to: 1 },
      duration: 700,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });

    // Invisible interactive zone
    this.activeHotzone = this.add.zone(coords.x, coords.y, coords.w, coords.h)
      .setInteractive({ useHandCursor: true })
      .setDepth(16);
    this.activeHotzone.once('pointerdown', () => {
      this.deactivateHotzone();
      this.collectEvidence(evidenceId);
    });
  }

  // ---- Deactivate current hotzone ----
  deactivateHotzone() {
    if (this.activeHotzoneGlow) {
      this.tweens.killTweensOf(this.activeHotzoneGlow);
      this.activeHotzoneGlow.destroy();
      this.activeHotzoneGlow = null;
    }
    if (this.activeHotzone) {
      this.activeHotzone.destroy();
      this.activeHotzone = null;
    }
  }

  // ---- Collect an evidence item ----
  collectEvidence(evidenceId) {
    if (this.collectedEvidence.includes(evidenceId)) {
      // Already collected — resume flow
      this.resumeAfterCollection();
      return;
    }
    this.collectedEvidence.push(evidenceId);
    this.updateEvidenceCounter();
    this.collecting = true;
    this.continueHint.setVisible(false).disableInteractive();
    this.showCollectionPopup(evidenceId);
  }

  // ---- Update evidence counter display ----
  updateEvidenceCounter() {
    this.evidenceCounterText.setText(`證據: ${this.collectedEvidence.length}/6`);
    // Brief flash
    this.tweens.add({
      targets: this.evidenceCounterText,
      alpha: { from: 0.3, to: 1 },
      duration: 400,
      ease: 'Sine.easeOut'
    });
    // Refresh log panel if visible
    if (this.logPanelVisible) {
      this.buildLogPanel();
    }
  }

  // ---- Show collection popup ----
  showCollectionPopup(evidenceId) {
    const evDef = ALL_EVIDENCE.find(e => e.id === evidenceId);
    if (!evDef) { this.closeCollectionPopup(); return; }

    this.clearPopup();
    const { width, height } = this.scale;
    const cx = width / 2;
    const cy = height / 2 - 50;

    // Dim overlay
    const overlay = this.add.rectangle(cx, height / 2, width, height, 0x000000, 0.55).setDepth(20);
    this.popupObjects.push(overlay);

    // Popup background
    const popupBg = this.add.rectangle(cx, cy, 560, 320, 0x0c1628, 0.97)
      .setStrokeStyle(2, 0xffcc00, 0.9)
      .setDepth(21);
    this.popupObjects.push(popupBg);

    // Title: 證據獲得！
    const titleText = this.add.text(cx, cy - 128, '✦ 證據獲得！✦', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '28px', color: '#ffcc00', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(22);
    this.popupObjects.push(titleText);

    // Evidence name
    const nameText = this.add.text(cx, cy - 68, evDef.name, {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '36px', color: '#e8f0ff', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(22);
    this.popupObjects.push(nameText);

    // CBT type label
    const typeLabels = {
      cognitive_restructure: '認知重組',
      behavioral_activation: '行為活化',
      reduce_misunderstanding: '減少誤解',
      socratic_questioning: '蘇格拉底式提問'
    };
    const typeText = this.add.text(cx, cy - 18, `【${typeLabels[evDef.type] || evDef.type}】`, {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '24px', color: '#88aacc'
    }).setOrigin(0.5).setDepth(22);
    this.popupObjects.push(typeText);

    // Description
    const descText = this.add.text(cx, cy + 36, evDef.desc, {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '22px', color: '#aabbcc',
      wordWrap: { width: 500 }, align: 'center'
    }).setOrigin(0.5, 0).setDepth(22);
    this.popupObjects.push(descText);

    // Confirm button
    const btnBg = this.add.rectangle(cx, cy + 132, 200, 56, 0x1a3a5c, 1)
      .setStrokeStyle(2, 0x4488cc, 0.8)
      .setDepth(22)
      .setInteractive({ useHandCursor: true });
    const btnText = this.add.text(cx, cy + 132, '確認', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '28px', color: '#a0c4ff'
    }).setOrigin(0.5).setDepth(23);
    this.popupObjects.push(btnBg, btnText);

    btnBg.on('pointerover', () => btnBg.setFillStyle(0x264d73, 1));
    btnBg.on('pointerout', () => btnBg.setFillStyle(0x1a3a5c, 1));
    btnBg.once('pointerdown', () => this.closeCollectionPopup());

    // Entrance tween
    const allObjs = [popupBg, titleText, nameText, typeText, descText, btnBg, btnText];
    allObjs.forEach(o => o.setAlpha(0));
    this.tweens.add({ targets: allObjs, alpha: 1, duration: 300, ease: 'Sine.easeOut' });
  }

  // ---- Clear popup objects ----
  clearPopup() {
    this.popupObjects.forEach(o => o.destroy());
    this.popupObjects = [];
  }

  // ---- Close collection popup and resume ----
  closeCollectionPopup() {
    this.clearPopup();
    this.collecting = false;
    this.resumeAfterCollection();
  }

  // ---- Resume dialogue flow after collection ----
  resumeAfterCollection() {
    // Still have uncollected hotzones in multi-hotzone mode — re-block advance and wait
    if (this.pendingMultiHotzones.size > 0) {
      this.collecting = true;
      return;
    }

    // All multi-hotzones collected — skip over their individual DIALOGUE entries
    if (this.multiHotzoneSkip > 0) {
      this.dialogueIndex += this.multiHotzoneSkip;
      this.multiHotzoneSkip = 0;
    }

    const entry = DIALOGUE[this.dialogueIndex];
    if (!entry) return;
    // Show continue hint (or choices) now that collection is done
    if (entry.choices) {
      this.showChoices(entry.choices);
    } else if (entry.end) {
      this.onLineComplete(entry); // re-run to handle end
    } else {
      this.continueHint.setVisible(true).setInteractive({ useHandCursor: true });
      this.continueHint.on('pointerover', () => this.continueHint.setTint(0xaad4ff));
      this.continueHint.on('pointerout', () => this.continueHint.clearTint());
      if (this.autoplay) this.scheduleAutoAdvance();
    }
  }

  // ---- Toggle evidence log panel ----
  toggleLogPanel() {
    this.logPanelVisible = !this.logPanelVisible;
    if (this.logPanelVisible) {
      this.buildLogPanel();
    } else {
      this.destroyLogPanel();
    }
  }

  // ---- Build log panel ----
  buildLogPanel() {
    this.destroyLogPanel();
    const { width } = this.scale;
    const panelX = 10;
    const panelY = 118;
    const panelW = 320;
    const panelH = 44 + ALL_EVIDENCE.length * 48 + 12;
    this.logPanel = this.add.container(panelX, panelY).setDepth(30);

    const bg = this.add.rectangle(panelW / 2, panelH / 2, panelW, panelH, 0x050d1a, 0.95)
      .setStrokeStyle(1, 0x4488cc, 0.6);
    this.logPanel.add(bg);

    const title = this.add.text(panelW / 2, 14, '收集紀錄', {
      fontFamily: '"Microsoft JhengHei", sans-serif',
      fontSize: '22px', color: '#a0c4ff'
    }).setOrigin(0.5, 0);
    this.logPanel.add(title);

    ALL_EVIDENCE.forEach((ev, i) => {
      const collected = this.collectedEvidence.includes(ev.id);
      const rowY = 52 + i * 48;
      const label = collected ? ev.name : '???';
      const color = collected ? '#e8f0ff' : '#445566';
      const icon = collected ? '✦' : '○';
      const iconColor = collected ? '#ffcc00' : '#334455';
      const iconT = this.add.text(18, rowY, icon, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '20px', color: iconColor
      }).setOrigin(0, 0.5);
      const nameT = this.add.text(44, rowY, label, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '22px', color
      }).setOrigin(0, 0.5);
      this.logPanel.add([iconT, nameT]);
    });
  }

  // ---- Destroy log panel ----
  destroyLogPanel() {
    if (this.logPanel) { this.logPanel.destroy(); this.logPanel = null; }
  }



  showChoices(choices) {
    this.choiceMode = true;
    this.continueHint.setVisible(false).disableInteractive();
    const { width, height } = this.scale;
    const boxY = height - 306;
    // Position choices dynamically above the dialog box with a 20px gap
    const startY = (boxY - 60) - (choices.length - 1) * 90;

    choices.forEach((text, i) => {
      const btnX = width / 1.4;
      const btnY = startY + i * 90;
      const btnBg = this.add.image(btnX, btnY, 'choicesBox')
        .setDisplaySize(360, 80)
        .setDepth(12).setInteractive({ useHandCursor: true });
      const btnText = this.add.text(btnX, btnY + 10, `${i + 1}. ${text}`, {
        fontFamily: '"Microsoft JhengHei", sans-serif',
        fontSize: '30px',
        color: '#e8f0ff'
      }).setOrigin(0.5).setDepth(13);

      btnBg.on('pointerover', () => btnBg.setTint(0xaad4ff));
      btnBg.on('pointerout', () => btnBg.clearTint());
      btnBg.on('pointerdown', () => {
        this.clearChoices();
        this.choiceMode = false;
        this.dialogueIndex++;
        this.showLine();
      });
      this.choiceButtons.push(btnBg, btnText);
    });
  }

  clearChoices() {
    this.choiceButtons.forEach(obj => obj.destroy());
    this.choiceButtons = [];
  }

  advance() {
    if (this.choiceMode) return;
    if (this.collecting) return;
    if (this.shardPopupOpen) return;

    if (this.autoplayTimer) { this.autoplayTimer.destroy(); this.autoplayTimer = null; }

    if (this.isTyping) {
      if (this.typeTimer) this.typeTimer.destroy();
      const entry = DIALOGUE[this.dialogueIndex];
      this.dialogueText.setText(entry.text);
      this.isTyping = false;
      this.onLineComplete(entry);
      return;
    }

    const entry = DIALOGUE[this.dialogueIndex];
    if (entry && entry.end) return;

    this.dialogueIndex++;
    if (this.dialogueIndex < DIALOGUE.length) {
      this.showLine();
    }
  }

  toggleAutoplay() {
    this.autoplay = !this.autoplay;
    this.autoplayImg.setAlpha(this.autoplay ? 1 : 0.45);
    if (this.autoplay && !this.isTyping && !this.choiceMode) {
      this.scheduleAutoAdvance();
    } else if (!this.autoplay && this.autoplayTimer) {
      this.autoplayTimer.destroy();
      this.autoplayTimer = null;
    }
  }

  scheduleAutoAdvance() {
    if (this.autoplayTimer) this.autoplayTimer.destroy();
    this.autoplayTimer = this.time.delayedCall(2000, () => {
      this.autoplayTimer = null;
      if (this.autoplay && !this.choiceMode) this.advance();
    });
  }

  toggleMusic() {
    this.musicOn = !this.musicOn;
    this.musicBtn.setAlpha(this.musicOn ? 1 : 0.4);
    if (this.musicOn) {
      if (!this.bgm.isPlaying) {
        const fadeMs = 1400;
        this.bgm.volume = 0;
        this.bgm.play();
        this.tweens.add({ targets: this.bgm, volume: 0.35, duration: 1500, ease: 'Linear' });
        this.bgmLoopTimer = this.time.delayedCall(
          Math.max(0, this.bgm.duration * 1000 - fadeMs), () => {
            this.tweens.killTweensOf(this.bgm);
            this.tweens.add({ targets: this.bgm, volume: 0, duration: fadeMs, ease: 'Linear' });
          });
      }
    } else {
      if (this.bgmLoopTimer) { this.bgmLoopTimer.destroy(); this.bgmLoopTimer = null; }
      this.tweens.killTweensOf(this.bgm);
      this.tweens.add({
        targets: this.bgm, volume: 0, duration: 800, ease: 'Linear',
        onComplete: () => { if (!this.musicOn) this.bgm.stop(); }
      });
    }
  }
}

// ---- Phaser config ----
const config = {
  type: Phaser.AUTO,
  width: 1920,
  height: 1080,
  parent: document.body,
  backgroundColor: '#000000',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [Chapter1Scene]
};

const game = new Phaser.Game(config);
</script>
</body>
