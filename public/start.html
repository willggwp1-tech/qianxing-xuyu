<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: "Microsoft JhengHei", sans-serif;
      color: #e0e0e0;
    }

    /* Background video — fills the fixed 1920×1080 canvas */
    #bg-video {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
      z-index: 0;
    }

    /* All page content sits above the video */
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    h1 {
      position: absolute;
      top: 220px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.5rem;
      color: #a0c4ff;
      text-shadow: 0 0 24px rgba(160,196,255,0.6);
      white-space: nowrap;
    }

    /* ── Each button is positioned independently ── */
    /* To reposition a button, change its top/left below.          */
    /* To make buttons invisible, remove class="debug" from <body> */

    .nav-btn {
      position: absolute;       /* individually placed */
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      /* width & height set per-button below */
      text-decoration: none;
      border-radius: 10px;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      font-family: inherit;
      user-select: none;
      /* invisible by default — background/border/color all transparent */
      background: transparent;
      border: none;
      color: transparent;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    /* ── Individual button positions & sizes — edit top/left/width/height freely ── */
    #btn-register  { top: 700px; left: 1510px; width: 200px; height: 200px; }
    #btn-chatbot   { top: 45px; left: 1200px; width: 100px; height: 100px; }
    #btn-story     { top: 45px; left: 1400px; width: 100px; height: 100px; }
    #btn-music     { top: 45px; left: 1580px; width: 100px; height: 100px; }
    #btn-share     { top: 45px; left: 1770px; width: 100px; height: 100px; }

    /* ── DEBUG MODE: add class="debug" to <body> to see buttons ── */
    body.debug .nav-btn {
      background: rgba(15, 35, 60, 0.72);
      border: 2px dashed rgba(160,196,255,0.7);
      color: #a0c4ff;
      backdrop-filter: blur(6px);
    }
    body.debug .nav-btn:hover {
      background: rgba(38, 77, 115, 0.85);
      box-shadow: 0 0 18px rgba(160,196,255,0.35);
    }
    body.debug .nav-btn:active {
      background: rgba(55, 110, 160, 0.9);
    }

    .btn-icon { font-size: 1.35rem; line-height: 1; }

    /* Toast notification */
    #toast {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 35, 60, 0.9);
      color: #a0c4ff;
      border: 1px solid rgba(160,196,255,0.5);
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      letter-spacing: 0.05em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Background video: autoplay, muted (required for autoplay), loops -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="assets/background/landing.mp4" type="video/mp4">
  </video>

    <div class="content">
      <!-- 1. Register / Start — position: #btn-register { top / left } -->
      <a class="nav-btn" id="btn-register" href="register.html">
        <span class="btn-icon">✦</span>
        <span>開始遊戲</span>
      </a>

      <!-- 2. Chatbot — position: #btn-chatbot { top / left } -->
      <a class="nav-btn" id="btn-chatbot" href="chatbot.html">
        <span class="btn-icon">💬</span>
        <span>聊天機器人</span>
      </a>

      <!-- 3. Story mode — position: #btn-story { top / left } -->
      <a class="nav-btn" id="btn-story" href="soulweave_story.html">
        <span class="btn-icon">📖</span>
        <span>故事模式</span>
      </a>

      <!-- 4. Music toggle — position: #btn-music { top / left } -->
      <button class="nav-btn" id="btn-music" onclick="toggleMusic()">
        <span class="btn-icon" id="music-icon">🔇</span>
        <span id="music-label">開啟音樂</span>
      </button>

      <!-- 5. Share / Copy link — position: #btn-share { top / left } -->
      <button class="nav-btn" id="btn-share" onclick="shareLink()">
        <span class="btn-icon">🔗</span>
        <span>分享連結</span>
      </button>

    <div id="toast">連結已複製到剪貼簿！</div>
  </div>

  <script>
    const video = document.getElementById('bg-video');
    const musicIcon = document.getElementById('music-icon');
    const musicLabel = document.getElementById('music-label');
    let musicOn = false;

    function toggleMusic() {
      musicOn = !musicOn;
      video.muted = !musicOn;
      musicIcon.textContent = musicOn ? '🔊' : '🔇';
      musicLabel.textContent = musicOn ? '關閉音樂' : '開啟音樂';
    }

    function shareLink() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      }).catch(() => {
        // Fallback for non-secure contexts
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      });
    }
  </script>

</body>
</html>
